<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root {
  --bg: #0a0608;
  --panel: #150d12;
  --gold: #c8960e;
  --gold-light: #f0c060;
  --gold-dark: #7a5500;
  --rose: #d42070;
  --rose-dark: #8a1040;
  --rose-light: #f050a0;
  --text: #f8e8d8;
  --muted: #8a6858;
  --border: rgba(200,150,14,0.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }
button { cursor: pointer; font-family: 'DM Sans', sans-serif; }
input, textarea, select { font-family: 'DM Sans', sans-serif; color: var(--text); }
textarea { resize: vertical; }

/* HEADER */
#header { background: linear-gradient(135deg, #150a08, #0a0608); border-bottom: 2px solid var(--gold); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 0 rgba(122,85,0,0.5), 0 6px 24px rgba(0,0,0,0.5); }
.header-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 20px; color: var(--gold); text-shadow: 0 0 12px rgba(200,150,14,0.4); }
.header-right { display: flex; gap: 10px; align-items: center; }
.header-lvl { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 12px; color: var(--gold); background: rgba(200,150,14,0.12); border: 1px solid rgba(200,150,14,0.3); border-radius: 8px; padding: 3px 10px; }
.header-xp { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 12px; color: var(--rose); }

/* NAV */
#nav { position: fixed; bottom: 0; left: 0; right: 0; background: #100808; border-top: 2px solid rgba(200,150,14,0.4); display: flex; padding: 6px 0 10px; z-index: 100; overflow-x: auto; box-shadow: 0 -4px 20px rgba(0,0,0,0.6); }
.nav-btn { flex: 1; min-width: 44px; background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 3px 0; }
.nav-btn .nav-icon { font-size: 18px; transition: transform 0.15s; }
.nav-btn .nav-label { font-family: 'Nunito', sans-serif; font-size: 8px; font-weight: 800; color: var(--muted); }
.nav-btn.active .nav-icon { transform: scale(1.2); filter: drop-shadow(0 0 4px var(--gold)); }
.nav-btn.active .nav-label { color: var(--gold); }

/* VIEWS */
.view { display: none; padding: 14px; }
.view.active { display: block; }

/* CARDS */
.card { background: rgba(200,150,14,0.06); border: 2px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.card-rose { background: rgba(212,48,112,0.06); border: 2px solid rgba(212,48,112,0.25); border-radius: 14px; padding: 14px; margin-bottom: 10px; }

/* INPUTS */
.inp { width: 100%; background: rgba(10,6,8,0.8); border: 2px solid rgba(200,150,14,0.4); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 14px; outline: none; }
.inp:focus { border-color: var(--gold); }
.lbl { font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 800; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; display: block; }

/* BUTTONS */
.btn-gold { background: linear-gradient(135deg, var(--rose), var(--rose-light)); border: 2px solid var(--rose-dark); box-shadow: 0 4px 0 rgba(138,16,64,0.5); border-radius: 12px; padding: 12px; color: var(--text); font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14px; width: 100%; transition: all 0.1s; }
.btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost { background: rgba(200,150,14,0.1); border: 1px solid rgba(200,150,14,0.3); border-radius: 10px; padding: 8px 14px; color: var(--gold); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px; }

/* XP BAR */
.xp-bar-track { background: #1a0e00; border-radius: 99px; height: 10px; overflow: hidden; border: 1.5px solid rgba(200,150,14,0.3); }
.xp-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

/* SECTION LABELS */
.section-label { display: inline-block; background: var(--rose); border: 2px solid rgba(138,16,64,0.6); box-shadow: 0 3px 0 rgba(138,16,64,0.5), inset 0 1px 0 rgba(240,192,96,0.3); border-radius: 10px; padding: 4px 14px; margin-bottom: 10px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 13px; color: white; }

/* NEON TEXT */
.neon-gold { font-family: 'Nunito', sans-serif; font-weight: 800; color: var(--gold); }
.neon-rose { font-family: 'Nunito', sans-serif; font-weight: 800; color: var(--rose); }

/* FLASH BANNER */
#flash { display: none; position: fixed; top: 30%; left: 50%; transform: translateX(-50%); z-index: 9999; background: linear-gradient(135deg, var(--rose), var(--rose-light)); border: 3px solid var(--rose-dark); box-shadow: 0 6px 0 rgba(138,16,64,0.6), 0 10px 28px rgba(0,0,0,0.4); border-radius: 24px; padding: 18px 28px; white-space: nowrap; animation: popIn 0.3s ease; }
#flash .flash-text { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: white; }
@keyframes popIn { from { transform: translateX(-50%) scale(0.5); opacity: 0; } to { transform: translateX(-50%) scale(1); opacity: 1; } }
@keyframes cfFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(120px) rotate(720deg); opacity: 0; } }

/* SPOTLIGHT */
.spotlight { position: absolute; top: -20px; left: 35px; width: 110px; height: 110px; background: radial-gradient(ellipse at 50% 30%, rgba(240,192,96,0.35) 0%, rgba(200,150,14,0.15) 40%, transparent 70%); pointer-events: none; border-radius: 50%; }

/* TOGGLES */
.tab-toggle { display: flex; background: rgba(200,150,14,0.06); border-radius: 10px; padding: 3px; border: 1px solid rgba(200,150,14,0.2); margin-bottom: 12px; }
.tab-toggle button { flex: 1; padding: 8px 6px; border-radius: 8px; border: none; font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; background: transparent; color: var(--muted); transition: all 0.15s; }
.tab-toggle button.active { background: linear-gradient(135deg, var(--rose), var(--gold)); color: var(--bg); }

/* QUEST CARD */
.quest-card { border-radius: 16px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; transition: all 0.2s; cursor: pointer; }
.quest-check { width: 24px; height: 24px; border-radius: 6px; border: 2.5px solid var(--muted); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.quest-check.done { background: var(--gold); border-color: var(--gold); box-shadow: 0 3px 0 rgba(122,85,0,0.5), 0 0 10px rgba(200,150,14,0.4); }
.quest-check.done::after { content: "✓"; color: var(--bg); font-weight: 900; font-size: 13px; }
.quest-text { flex: 1; font-size: 15px; font-weight: 500; }
.quest-xp { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 11px; }

/* AREA TABS */
.area-tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 4px; }
.area-tab { flex-shrink: 0; padding: 6px 12px; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 900; border: 2.5px solid rgba(200,150,14,0.3); background: var(--panel); color: var(--text); transition: all 0.1s; box-shadow: 0 3px 0 rgba(0,0,0,0.4); }
.area-tab.active { transform: translateY(-2px); box-shadow: 0 5px 0 rgba(0,0,0,0.3); }

/* CHAT BUBBLES */
.bubble-user { background: rgba(200,150,14,0.15); border: 1.5px solid rgba(200,150,14,0.4); border-radius: 16px 16px 4px 16px; padding: 10px 14px; max-width: 82%; margin-left: auto; margin-bottom: 8px; font-size: 14px; line-height: 1.5; }
.bubble-ai { background: rgba(212,48,112,0.12); border: 1.5px solid rgba(212,48,112,0.4); border-radius: 16px 16px 16px 4px; padding: 10px 14px; max-width: 82%; margin-right: auto; margin-bottom: 8px; font-size: 14px; line-height: 1.5; }
.bubble-label { font-family: 'Nunito', sans-serif; font-size: 7px; font-weight: 800; margin-bottom: 4px; }

/* WATER TRACKER */
.water-fill { position: relative; height: 44px; border-radius: 22px; overflow: hidden; border: 2px solid var(--gold); background: var(--bg); }
.water-fill-bar { position: absolute; bottom: 0; left: 0; height: 100%; border-radius: 22px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
.water-fill-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14px; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }

/* MED TRACKER */
.med-card { background: rgba(212,48,112,0.08); border: 2px solid rgba(212,48,112,0.3); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
.med-check { width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid var(--rose); background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
.med-check.taken { background: var(--rose); box-shadow: 0 0 10px rgba(212,48,112,0.5); }
.med-check.taken::after { content: "✓"; color: white; font-weight: 900; font-size: 14px; }

/* MOOD BUTTONS */
.mood-btn { flex: 1; background: var(--panel); border: 2.5px solid rgba(200,150,14,0.25); border-radius: 14px; padding: 10px 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.12s; }
.mood-btn.selected { background: rgba(106,30,154,0.18); border-color: #7a30c0; box-shadow: 0 4px 0 rgba(106,30,154,0.5); transform: translateY(-2px); }
.mood-emoji { font-size: 24px; }
.mood-desc { font-family: 'Nunito', sans-serif; font-size: 9px; font-weight: 800; color: var(--muted); }
.mood-btn.selected .mood-desc { color: #9b50e0; }

/* ENERGY BUTTONS */
.energy-btn { width: 100%; background: var(--panel); border: 2px solid rgba(200,150,14,0.2); border-radius: 12px; padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; transition: all 0.12s; }
.energy-btn.selected { background: rgba(58,125,82,0.18); border-color: #3a7d52; box-shadow: 0 4px 0 rgba(58,125,82,0.5); transform: translateY(-2px); }
.energy-label-text { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; color: var(--muted); }
.energy-btn.selected .energy-label-text { color: #5abe7a; }

/* ORDER STEP */
.order-step { display: flex; gap: 10px; align-items: flex-start; padding: 11px 13px; border-radius: 12px; margin-bottom: 5px; transition: all 0.15s; }
.order-step-check { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 2px solid var(--muted); background: transparent; transition: all 0.2s; }
.order-step-check.done { background: var(--gold); border-color: var(--gold); }
.order-step-check.done::after { content: "✓"; color: var(--bg); font-weight: 900; font-size: 12px; }

/* POLICY TOGGLE */
.policy-toggle { display: flex; align-items: center; gap: 8px; background: rgba(200,150,14,0.08); border: 1px solid rgba(200,150,14,0.25); border-radius: 10px; padding: 8px 12px; cursor: pointer; width: 100%; text-align: left; margin-top: 8px; font-family: 'DM Sans', sans-serif; }
.policy-items { background: rgba(200,150,14,0.04); border: 1px solid rgba(200,150,14,0.15); border-top: none; border-radius: 0 0 10px 10px; padding: 9px 12px; }
.policy-item { font-size: 12px; color: #d4a855; padding: 4px 0; border-bottom: 1px solid rgba(200,150,14,0.08); line-height: 1.5; }
.policy-item:last-child { border-bottom: none; }

/* SCROLLABLE CHAT */
.chat-scroll { max-height: 45vh; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; }

/* WEEK DAY */
.week-day-box { width: 46px; height: 46px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; border: 3px solid rgba(200,150,14,0.3); background: var(--panel); }
.week-day-box.today { background: rgba(200,150,14,0.2); border-color: var(--gold); box-shadow: 0 4px 0 rgba(122,85,0,0.5); }

/* TROPHY */
.trophy-card { border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }

/* PROGRESS RING SVG */
.ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(200,150,14,0.3); border-radius: 99px; }

/* PLANNER TASK */
.task-card { border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
.task-header { padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; }
.task-circle { width: 24px; height: 24px; border-radius: 12px; border: 2.5px solid var(--muted); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all 0.2s; margin-top: 1px; }
.task-circle.done { background: var(--gold); border-color: var(--gold); box-shadow: 0 3px 0 rgba(122,85,0,0.5); }
.task-circle.done::after { content: "✓"; color: var(--bg); font-weight: 900; font-size: 13px; }

/* QUICK LINK GRID */
.quick-links { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.quick-link { border-radius: 16px; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; text-decoration: none; transition: transform 0.1s; }
.quick-link:active { transform: scale(0.95); }
.quick-link-icon { font-size: 22px; }
.quick-link-label { font-family: 'Nunito', sans-serif; font-size: 9px; font-weight: 800; text-align: center; }

/* SECTION BADGE */
.section-badge { display: inline-block; border-radius: 10px; padding: 4px 14px; margin-bottom: 10px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 13px; color: white; }

/* STEP NUMBER */
.step-num { width: 18px; height: 18px; border-radius: 5px; background: rgba(200,150,14,0.15); color: var(--gold); font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* BUDGET BAR */
.budget-bar { background: #1e1810; border-radius: 99px; height: 10px; overflow: hidden; border: 1px solid rgba(200,150,14,0.2); }
.budget-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }
</style>

<script>
// ═══════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════
const S = {
  get(k, d) { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : d; } catch(e) { return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const today = () => new Date().toDateString();
const isToday = (s) => s === today();

// ── API KEY MANAGEMENT ──────────────────────────────────
function getApiKey() {
  return localStorage.getItem('anchor_api_key') || '';
}

function getApiHeaders() {
  var key = getApiKey();
  return {
    'Content-Type': 'application/json',
    'x-api-key': key,
    'anthropic-version': '2023-06-01',
    'anthropic-dangerous-direct-browser-access': 'true'
  };
}

function hasApiKey() {
  return !!getApiKey();
}

function showApiKeySetup() {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,6,8,0.97);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  var box = document.createElement('div');
  box.style.cssText = 'background:#150d12;border:2px solid #c8960e;border-radius:18px;padding:24px;max-width:340px;width:100%;';
  
  var title = document.createElement('div');
  title.style.cssText = 'font-family:Nunito,sans-serif;font-weight:900;font-size:18px;color:#c8960e;margin-bottom:8px;';
  title.textContent = 'ARIA API Key';

function logHistory(category, action, detail, xp) {
  var now = new Date();
  var entry = {
    id: 'h_' + Date.now(),
    date: now.toDateString(),
    time: (function() { try { return now.toLocaleTimeString('en-US', {timeZone:'America/New_York', hour:'2-digit', minute:'2-digit', hour12:true}); } catch(e) { return now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); } })(),
    ts: Date.now(),
    category: category, // quest, mood, med, money, boundary, win, dailystart, task
    action: action,     // short label
    detail: detail,     // full description
    xp: xp || 0,
  };
  var log = S.get('a_history', []);
  log.push(entry);
  // Keep last 500 entries
  if (log.length > 500) log = log.slice(log.length - 500);
  S.set('a_history', log);
}

function el(id) { return document.getElementById(id); }
function qs(sel) { return document.querySelector(sel); }
function qsa(sel) { return document.querySelectorAll(sel); }
function h(tag, attrs) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    var v = attrs[k];
    if (k === 'style') e.style.cssText = v;
    else if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  var children = Array.prototype.slice.call(arguments, 2);
  function appendChildren(arr) {
    arr.forEach(function(c) {
      if (c === null || c === undefined) return;
      if (Array.isArray(c)) { appendChildren(c); return; }
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else if (c instanceof Node) e.appendChild(c);
    });
  }
  appendChildren(children);
  return e;
}

function showFlash(msg) {
  el('flashText').textContent = msg;

function addXP(amount, areaId, text) {
  state.xp += amount;

  if (state.xp >= needed) {
    state.xp -= needed;
    state.level++;
    showFlash('LEVEL UP!');
  } else {
    showFlash('+' + amount + ' XP!');
  }
  if (areaId && state.stats[areaId] !== undefined) state.stats[areaId]++;
  if (text) state.wins.push({ area: areaId || 'self', text, xp: amount, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
  if (typeof logHistory === 'function') logHistory('win', 'Win Unlocked', text || 'Achievement', amount);
  updateHeader();
  saveState();
}

function updateHeader() {
  el('headerLvl').textContent = 'LVL ' + state.level;

}

function getQuestLevel() {
  if (state.level >= 6) return 2;

}

function fmt(s) { return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }

function callClaude(messages, opts) {
  var body = { model: 'claude-haiku-4-5-20251001', max_tokens: opts.maxTokens || 1000, messages: messages };
  if (opts.tools) body.tools = opts.tools;
  if (opts.system) body.system = opts.system;
  return fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: getApiHeaders(),
    body: JSON.stringify(body),
  }).then(function(r) { return r.json(); }).then(function(d) {
    return d.content.filter(function(c) { return c.type === 'text'; }).map(function(c) { return c.text; }).join('');
  }).catch(function(e) {
    console.log('API error:', e);
    return '';
  });
}

    waterSection.appendChild(wCard);

    waterSection.style.display = 'none';

function makeQuestCard(quest, area) {
  var done = !!state.completed[quest.id];
  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:relative;margin-bottom:2px;';

  var card = document.createElement('div');
  card.className = 'quest-card';
  card.style.cssText = 'border:2.5px solid ' + (done ? area.color + '60' : area.color) + ';box-shadow:' + (done ? 'none' : '0 5px 0 ' + area.color + '99,0 7px 20px ' + area.color + '30') + ';background:' + (done ? '#100e1a' : hexTint(area.color)) + ';opacity:' + (done ? 0.6 : 1) + ';cursor:' + (done ? 'default' : 'pointer') + ';';

  var chk = document.createElement('div');
  chk.className = 'quest-check' + (done ? ' done' : '');
  chk.style.borderColor = done ? '#c8960e' : area.color;

  var txt = document.createElement('div');
  txt.className = 'quest-text';
  txt.style.cssText = 'color:' + (done ? '#8a6858' : '#f8e8d8') + ';text-decoration:' + (done ? 'line-through' : 'none') + ';';
  txt.textContent = quest.text;

  var xpSpan = document.createElement('span');
  xpSpan.className = 'quest-xp';
  xpSpan.style.color = done ? '#8a6858' : area.color;
  xpSpan.textContent = '+' + quest.xp + 'XP';

  card.appendChild(chk);
  card.appendChild(txt);
  card.appendChild(xpSpan);
  wrapper.appendChild(card);

  // Delete button for custom quests
  if (quest.custom && !done) {
    var del = document.createElement('button');
    del.style.cssText = 'position:absolute;top:8px;right:8px;background:transparent;border:none;color:#8a6858;font-size:13px;cursor:pointer;padding:2px 6px;';
    del.textContent = '✕';
    del.addEventListener('click', function(e) {
      e.stopPropagation();
      removeCustomQuest(quest.id);
    });
    wrapper.appendChild(del);
  }

  // Click to complete
  card.addEventListener('click', function() {
    if (!done) completeQuest(quest, area);
  });

  // Long press to show hide/delete menu
  var pressTimer = null;
  var longPressFired = false;

  card.addEventListener('touchstart', function(e) {
    longPressFired = false;
    pressTimer = setTimeout(function() {
      longPressFired = true;
      showQuestActionMenu(quest, area, card);
    }, 600);
  });

  card.addEventListener('touchend', function(e) {
    if (pressTimer) clearTimeout(pressTimer);
    if (longPressFired) e.preventDefault();
  });

  card.addEventListener('touchmove', function() {
    if (pressTimer) clearTimeout(pressTimer);
  });

  // Mouse long press for desktop testing
  card.addEventListener('mousedown', function(e) {
    longPressFired = false;
    pressTimer = setTimeout(function() {
      longPressFired = true;
      showQuestActionMenu(quest, area, card);
    }, 600);
  });

  card.addEventListener('mouseup', function() {
    if (pressTimer) clearTimeout(pressTimer);
  });

  return wrapper;
}

function showQuestActionMenu(quest, area, anchorEl) {
  // Remove any existing menu
  var existing = el('questActionMenu');
  if (existing) existing.remove();

  var menu = document.createElement('div');
  menu.id = 'questActionMenu';
  menu.style.cssText = 'position:fixed;z-index:8000;background:#150d12;border:2px solid ' + area.color + ';border-radius:16px;padding:6px;box-shadow:0 8px 32px rgba(0,0,0,0.6);min-width:200px;';

  // Title
  var title = document.createElement('div');
  title.style.cssText = 'font-family:Nunito,sans-serif;font-size:10px;font-weight:700;color:#8a6858;padding:6px 10px 4px;letter-spacing:0.1em;';
  title.textContent = 'TASK OPTIONS';
  menu.appendChild(title);

  // Quest text preview
  var preview = document.createElement('div');
  preview.style.cssText = 'font-size:12px;color:#f8e8d8;padding:4px 10px 8px;border-bottom:1px solid rgba(200,150,14,0.15);line-height:1.4;';
  preview.textContent = quest.text.length > 50 ? quest.text.substring(0, 50) + '...' : quest.text;
  menu.appendChild(preview);

  // Hide button
  var hideBtn = document.createElement('button');
  hideBtn.style.cssText = 'width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:none;padding:10px 12px;cursor:pointer;border-radius:10px;font-family:Nunito,sans-serif;';
  hideBtn.innerHTML = '<span style="font-size:18px;">👁️</span><div style="text-align:left;"><div style="font-size:13px;font-weight:700;color:#c8960e;">Hide task</div><div style="font-size:11px;color:#8a6858;">Can restore from Hidden list</div></div>';
  hideBtn.addEventListener('click', function() {
    menu.remove();
    hideQuest(quest.id);
  });
  hideBtn.addEventListener('mouseover', function() { hideBtn.style.background = 'rgba(200,150,14,0.08)'; });
  hideBtn.addEventListener('mouseout', function() { hideBtn.style.background = 'transparent'; });
  menu.appendChild(hideBtn);

  // Delete button
  var delBtn = document.createElement('button');
  delBtn.style.cssText = 'width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:none;padding:10px 12px;cursor:pointer;border-radius:10px;font-family:Nunito,sans-serif;';
  var isBuiltIn = !quest.custom;
  delBtn.innerHTML = '<span style="font-size:18px;">🗑️</span><div style="text-align:left;"><div style="font-size:13px;font-weight:700;color:#d42070;">Delete task</div><div style="font-size:11px;color:#8a6858;">' + (isBuiltIn ? 'Permanently removes this quest' : 'Removes your custom task') + '</div></div>';
  delBtn.addEventListener('click', function() {
    menu.remove();
    if (isBuiltIn) {
      showDeleteConfirm(quest, area);
    } else {
      removeCustomQuest(quest.id);
    }
  });
  delBtn.addEventListener('mouseover', function() { delBtn.style.background = 'rgba(212,48,112,0.08)'; });
  delBtn.addEventListener('mouseout', function() { delBtn.style.background = 'transparent'; });
  menu.appendChild(delBtn);

  // Cancel
  var cancelBtn = document.createElement('button');
  cancelBtn.style.cssText = 'width:100%;text-align:center;background:transparent;border:none;padding:8px;cursor:pointer;font-family:Nunito,sans-serif;font-size:12px;color:#8a6858;border-top:1px solid rgba(200,150,14,0.15);margin-top:4px;border-radius:0 0 10px 10px;';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', function() { menu.remove(); });
  menu.appendChild(cancelBtn);

  // Position menu near the card
  var rect = anchorEl.getBoundingClientRect();
  var menuTop = Math.min(rect.bottom + 8, window.innerHeight - 220);
  var menuLeft = Math.max(8, Math.min(rect.left, window.innerWidth - 220));
  menu.style.top = menuTop + 'px';
  menu.style.left = menuLeft + 'px';

  document.body.appendChild(menu);

  // Close on outside tap
  setTimeout(function() {
    document.addEventListener('touchstart', function closeMenu(e) {
      if (!menu.contains(e.target)) {
        menu.remove();
        document.removeEventListener('touchstart', closeMenu);
      }
    });
    document.addEventListener('mousedown', function closeMenuM(e) {
      if (!menu.contains(e.target)) {
        menu.remove();
        document.removeEventListener('mousedown', closeMenuM);
      }
    });
  }, 100);
}

function hideQuest(questId) {
  var areaId = state.activeArea;
  if (!state.hiddenQuests[areaId]) state.hiddenQuests[areaId] = [];
  if (state.hiddenQuests[areaId].indexOf(questId) === -1) {
    state.hiddenQuests[areaId].push(questId);
  }
  saveState();
  showFlash('TASK HIDDEN');
  renderQuestArea();
}

function restoreQuest(questId) {
  var areaId = state.activeArea;
  if (state.hiddenQuests[areaId]) {
    state.hiddenQuests[areaId] = state.hiddenQuests[areaId].filter(function(id) { return id !== questId; });
  }
  saveState();
  showFlash('TASK RESTORED');
  renderQuestArea();
}

function deleteBuiltInQuest(questId, areaId) {
  if (!state.deletedQuests[areaId]) state.deletedQuests[areaId] = [];
  if (state.deletedQuests[areaId].indexOf(questId) === -1) {
    state.deletedQuests[areaId].push(questId);
  }
  // Also remove from hidden if it was there
  if (state.hiddenQuests[areaId]) {
    state.hiddenQuests[areaId] = state.hiddenQuests[areaId].filter(function(id) { return id !== questId; });
  }
  saveState();
  showFlash('TASK DELETED');
  renderQuestArea();
}


function hexTint(hex) {
  const isRose = hex.includes('d42070') || hex.includes('f050a0') || hex.includes('8a1040') || hex.includes('f0c060');
  return isRose ? 'rgba(212,48,112,0.08)' : 'rgba(200,150,14,0.08)';
}

function completeQuest(quest, area) {
  if (state.completed[quest.id]) return;
  state.completed[quest.id] = true;
  if (quest.isWater) {
    const nextNum = quest.waterNum + 1;
    if (nextNum <= WATER_GOAL) {
      const nid = 'water_' + nextNum;
      if (!state.customQuests[area.id]) state.customQuests[area.id] = [];
      state.customQuests[area.id] = state.customQuests[area.id].filter(q => !q.isWater || q.waterNum !== nextNum);
      state.customQuests[area.id].push({ id: nid, text: 'Drink 16.9 oz (bottle ' + nextNum + ') of water', xp: 15, isWater: true, waterNum: nextNum, dynamic: true });
    }
    const waterDone = Object.keys(state.completed).filter(k => k.startsWith('water_') || k === 's1').length;
    if (waterDone >= WATER_GOAL) setTimeout(() => showFlash('💧 WATER GOAL DONE!'), 500);
  }
  addXP(quest.xp, area.id, quest.text);
  renderQuestArea();
  renderCharacter();
}

function removeCustomQuest(id) {
  Object.keys(state.customQuests).forEach(areaId => {
    state.customQuests[areaId] = (state.customQuests[areaId] || []).filter(q => q.id !== id);
  });
  saveState();
  renderQuestArea();
}

function toggleAddQuestForm() {
  const form = el('addQuestForm');
  const ai = el('aiSuggestPanel');
  if (form.style.display === 'none') {
    ai.style.display = 'none';
    form.style.display = 'block';
    form.innerHTML = `
      <div style="border:3px solid #c8960e;box-shadow:0 5px 0 rgba(122,85,0,0.5);border-radius:18px;padding:12px;background:rgba(200,150,14,0.08);">
        <div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:#c8960e;margin-bottom:8px;">ADD YOUR OWN TASK</div>

          <button onclick="addCustomQuest()" style="background:linear-gradient(135deg,#d42070,#f050a0);border:2px solid #8a1040;box-shadow:0 4px 0 rgba(138,16,64,0.5);border-radius:10px;padding:0 16px;color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;cursor:pointer;">+</button>

function addCustomQuest() {
  const input = el('newQuestInput');
  if (!input || !input.value.trim()) return;
  const areaId = state.activeArea;
  if (!state.customQuests[areaId]) state.customQuests[areaId] = [];
  state.customQuests[areaId].push({ id: 'c_' + Date.now(), text: input.value.trim(), xp: 20, custom: true });
  el('addQuestForm').style.display = 'none';
  showFlash('QUEST ADDED!');
  saveState();
  renderQuestArea();
}

function fetchAISuggestions() {
  const form = el('addQuestForm');
  const ai = el('aiSuggestPanel');
  form.style.display = 'none';
  ai.style.display = 'block';
  const area = LIFE_AREAS.find(a => a.id === state.activeArea);
  ai.innerHTML = `<div style="border:3px solid #d42070;box-shadow:0 5px 0 rgba(138,16,64,0.5);border-radius:18px;padding:12px;background:rgba(212,48,112,0.08);"><div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:#d42070;margin-bottom:8px;">✨ AI SUGGESTIONS — LVL ${state.level}</div><div style="color:#8a6858;font-size:14px;">Generating tasks for your level...</div></div>`;
  const prompt = 'Suggest 4 daily tasks for someone with ADHD burnout, depression, anxiety, and suspected autism who is rebuilding their life. They are at player level ' + state.level + '. Life area: "' + state.activeArea + '" (' + area.label + '). Tasks should be slightly more challenging than basic but still very doable. Return ONLY a JSON array of 4 strings, no markdown. Example: ["Task one","Task two","Task three","Task four"]';
  callClaude([{ role: 'user', content: prompt }], { maxTokens: 400 })
    .then(txt => {
      const clean = txt.replace(/```json|```/gm, '').trim();
      const suggestions = JSON.parse(clean);
      ai.innerHTML = `<div style="border:3px solid #d42070;box-shadow:0 5px 0 rgba(138,16,64,0.5);border-radius:18px;padding:12px;background:rgba(212,48,112,0.08);">
        <div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:#d42070;margin-bottom:8px;">✨ AI SUGGESTIONS — LVL ${state.level}</div>
        ${suggestions.map(s => `<div onclick="addSuggestion('${s.replace(/'/g,"\\'")}',this)" style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;margin-bottom:6px;background:rgba(10,6,8,0.8);border:2px solid rgba(212,48,112,0.4);border-radius:10px;cursor:pointer;">
          <span style="font-size:14px;color:#f8e8d8;flex:1;">${s}</span>
          <span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;color:#c8960e;margin-left:8px;">+ ADD</span>
        </div>`).join('')}
        <button onclick="el('aiSuggestPanel').style.display='none'" style="background:transparent;border:none;color:#8a6858;font-size:12px;cursor:pointer;margin-top:4px;">Close</button>
      </div>`;
    })
    .catch(() => { ai.innerHTML = '<div style="color:#d42070;font-size:13px;padding:10px;">Could not load suggestions. Try again.</div>'; });
}

function addSuggestion(text, el_ref) {
  const areaId = state.activeArea;
  if (!state.customQuests[areaId]) state.customQuests[areaId] = [];
  state.customQuests[areaId].push({ id: 'ai_' + Date.now(), text, xp: 25, custom: true, aiSuggested: true });
  if (el_ref && el_ref.parentNode) el_ref.parentNode.removeChild(el_ref);
  showFlash('QUEST ADDED!');
  saveState();
  renderQuestArea();
}

function renderMeds() {

    </div>`;
  }

  container.innerHTML = html;
}

function toggleMed(medId) {
  if (state.medsTaken[medId]) {
    delete state.medsTaken[medId];
  } else {
    state.medsTaken[medId] = true;
    addXP(20, 'self', 'Took medication');
    if (typeof logHistory === 'function') logHistory('med', 'Medication Taken', 'Logged as taken', 20);
  }
  saveState();
  renderMeds();
  // Also update self quest if med is taken
  const allTaken = state.meds.every(m => state.medsTaken[m.id]);
  if (allTaken && state.meds.length > 0) showFlash('💊 ALL MEDS TAKEN!');
}

function addMed() {
  const name = el('medName').value.trim();
  const dose = el('medDose').value.trim();
  const time = el('medTime').value.trim();
  if (!name || !dose) return;
  state.meds.push({ id: 'med_' + Date.now(), name, dose, time });
  el('medName').value = '';
  el('medDose').value = '';
  el('medTime').value = '';
  saveState();
  showFlash('MED SAVED!');
  renderMeds();
}

function removeMed(medId) {
  state.meds = state.meds.filter(m => m.id !== medId);
  delete state.medsTaken[medId];
  saveState();
  renderMeds();
}

// PAGE INITIALIZATION

document.addEventListener('DOMContentLoaded', function() {
  // IMMEDIATELY save state to write today's date keys
  saveState();

  // Render initial view with persisted state
  try { updateHeader(); } catch(e) {}
  try { renderQuests(); } catch(e) { console.log('renderQuests error:', e); }
  
  // Confirm localStorage is working
  try {
    localStorage.setItem('a_test', '1');
    var test = localStorage.getItem('a_test');
    if (test !== '1') console.warn('localStorage not working');
    localStorage.removeItem('a_test');
  } catch(e) {
    console.warn('localStorage error:', e);
  }

  // Auto-save on iOS home screen app hide
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') saveState();
  });

  // Auto-save every 60 seconds
  setInterval(function() { try { saveState(); } catch(e) {} }, 60000);

  // Save on browser unload
  window.addEventListener('beforeunload', function() { saveState(); });

  // Daily Start: check if needed today
  var lastDS = localStorage.getItem('a_dsdate') || '';
  if (lastDS !== new Date().toDateString()) {
    // Try multiple times to handle Safari timing quirks
    var dsAttempts = 0;
    var tryDailyStart = function() {
      try {
        dsAttempts++;
        if (typeof openDailyStart === 'function' && el('view-quests')) {
          openDailyStart();
        } else if (dsAttempts < 10) {
          setTimeout(tryDailyStart, 300);
        }
      } catch(e) { /* silently handle */ }
    };
    setTimeout(tryDailyStart, 500);
  }
});
</script>

// ═══════════════════════════════════════════════════════
// ARIA COMPANION
// ═══════════════════════════════════════════════════════
function renderAria() {
  // Show key setup prompt if no key
  if (!getApiKey()) {
    var notice = el('ariaKeyNotice');
    if (!notice) {
      notice = document.createElement('div');
      notice.id = 'ariaKeyNotice';
      notice.style.cssText = 'background:rgba(200,150,14,0.1);border:2px solid rgba(200,150,14,0.4);border-radius:12px;padding:12px;margin-bottom:12px;font-size:13px;color:#c8960e;text-align:center;cursor:pointer;';
      notice.innerHTML = '🔑 Tap here to add your API key and activate ARIA';
      notice.addEventListener('click', showApiKeySetup);
    }
  }
  const container = el('ariaContent');
  container.innerHTML = `
    <div style="text-align:center;margin-bottom:16px;font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:#d42070;">💗 ARIA // COMPANION</div>
    <div class="chat-scroll" id="ariaChat" style="margin-bottom:12px;"></div>
    <div style="display:flex;gap:8px;">
      <input id="ariaInput" class="inp" placeholder="Talk to ARIA..." style="flex:1;" onkeydown="if(event.key==='Enter')sendAria();" />
      <button onclick="sendAria()" style="background:rgba(212,48,112,0.2);border:2px solid #d42070;box-shadow:0 4px 0 rgba(138,16,64,0.5);border-radius:10px;padding:0 16px;cursor:pointer;color:#d42070;font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;">▶</button>
    </div>`;
  renderAriaMessages();
}

function renderAriaMessages() {
  const chat = el('ariaChat');
  if (!chat) return;
  chat.innerHTML = '';
  state.ariaMessages.forEach(m => {
    const bubble = h('div', { class: m.role === 'user' ? 'bubble-user' : 'bubble-ai' });
    if (m.role === 'ai') {
      bubble.innerHTML = '<div class="bubble-label" style="color:#d42070;">ARIA</div>' + escHtml(m.text);
    } else {
      bubble.textContent = m.text;
    }
    chat.appendChild(bubble);
  });
  chat.scrollTop = chat.scrollHeight;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

async function sendAria() {
  const input = el('ariaInput');
  if (!input || !input.value.trim()) return;
  if (!getApiKey()) {
    state.ariaMessages.push({ role: 'ai', text: 'Please tap the 🔑 button and enter your Anthropic API key first.' });
    renderAriaMessages();
    return;
  }
  const text = input.value.trim();
  input.value = '';
  state.ariaMessages.push({ role: 'user', text });
  renderAriaMessages();
  const loadBubble = h('div', { class: 'bubble-ai' });
  loadBubble.innerHTML = '<div class="bubble-label" style="color:#d42070;">ARIA</div>Thinking...';
  el('ariaChat').appendChild(loadBubble);
  el('ariaChat').scrollTop = el('ariaChat').scrollHeight;
  const history = state.ariaMessages.slice(0,-1).map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));
  history.push({ role: 'user', content: text });
  try {
    const system = 'You are ARIA, a warm AI companion in a life management app called Anchor.' + (typeof getTrendContext === 'function' ? getTrendContext() : '') + ' You are the user\'s party member — honest, encouraging but real, never toxic positivity. The user has ADHD burnout, depression, anxiety, and suspected autism. They struggle with motivation, starting tasks, and time management. Talk like a caring friend who gets it, not a therapist. Keep it to 2-4 sentences usually. Never shame. When stuck, offer ONE tiny next step. Acknowledge feelings before problem-solving.';
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: getApiHeaders(),
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 500, system, messages: history }),
    });
    const data = await res.json();
    if (data.error) {
      state.ariaMessages.push({ role: 'ai', text: 'API Error: ' + data.error.message + ' (type: ' + data.error.type + ')' });
      loadBubble.remove();
      renderAriaMessages();
      return;
    }
    const reply = data.content.map(c => c.text || '').join('');
    state.ariaMessages.push({ role: 'ai', text: reply });
  } catch(e) {
    var errMsg = e && e.message ? e.message : String(e);
    state.ariaMessages.push({ role: 'ai', text: 'Error: ' + errMsg + ' — Check your API key with the 🔑 button.' });
  }
  renderAriaMessages();
}

        ${limit>0?`<div class="budget-bar"><div class="budget-bar-fill" style="width:${pct}%;background:${over?'#d42070':cat.color};"></div></div><div style="display:flex;justify-content:space-between;margin-top:4px;"><span style="font-size:10px;color:#8a6858;">Spent: $${spent.toFixed(2)}</span><span style="font-size:10px;color:${over?'#d42070':'#5abe7a'};">${over?'Over $'+(spent-limit).toFixed(2):'Left: $'+(limit-spent).toFixed(2)}</span></div>`:''}
      </div>`;
    }).join('')}`;
  }

  if (state.activeMoneyTab === 'spending') {
    const expRows = state.expenses.slice().reverse().map((e,i) => {
      const cat = BUDGET_CATS.find(c => c.id === e.category) || BUDGET_CATS[0];
      return `<div style="border:2px solid ${cat.color};box-shadow:0 3px 10px rgba(${cat.color==='#d42070'?'212,48,112':'200,150,14'},0.15);border-radius:14px;padding:12px 14px;margin-bottom:8px;background:rgba(${cat.color==='#d42070'?'212,48,112':'200,150,14'},0.06);display:flex;align-items:center;gap:10px;">
        <span style="font-size:18px;">${cat.icon}</span>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;color:#f8e8d8;">${e.name}</div>
          <div style="font-size:10px;color:#8a6858;font-family:'Nunito',sans-serif;">${e.date} · ${cat.label}</div>
        </div>
        <span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;color:${cat.color};">-$${parseFloat(e.amount).toFixed(2)}</span>
      </div>`;
    }).join('');
    body = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#d42070;">SPENDING LOG</span><button onclick="toggleAddExpenseForm()" class="btn-ghost">+ LOG</button></div>
    <div id="addExpenseForm" style="display:none;margin-bottom:12px;"></div>
    ${expRows || '<div style="text-align:center;padding:20px;color:#8a6858;font-size:13px;">No expenses yet. Every dollar tracked is a win.</div>'}
    ${state.expenses.length>0?`<div style="border:2px solid rgba(212,48,112,0.4);border-radius:12px;padding:10px 14px;display:flex;justify-content:space-between;"><span style="font-family:'Nunito',sans-serif;font-size:11px;color:#8a6858;">TOTAL LOGGED</span><span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;color:#d42070;">-$${totalSpent.toFixed(2)}</span></div>`:''}`;
  }

  if (state.activeMoneyTab === 'coach') {
    const msgs = moneyCoachMsgs.map(m => `<div class="${m.role==='user'?'bubble-user':'bubble-ai'}">${m.role==='ai'?'<div class="bubble-label" style="color:#c8960e;">BUDGET COACH</div>':''}${escHtml(m.text)}</div>`).join('');
    body = `<div style="text-align:center;margin-bottom:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#c8960e;">🤖 BUDGET COACH</div>
    <div class="chat-scroll" id="coachChat" style="margin-bottom:12px;">${msgs}</div>
    <div style="display:flex;gap:8px;">
      <input id="coachInput" class="inp" placeholder="Ask your coach anything..." style="flex:1;" onkeydown="if(event.key==='Enter')sendCoach();" />
      <button onclick="sendCoach()" style="background:rgba(200,150,14,0.2);border:2px solid #c8960e;box-shadow:0 4px 0 rgba(122,85,0,0.5);border-radius:10px;padding:0 14px;cursor:pointer;color:#c8960e;font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;">▶</button>
    </div>`;
  }

  container.innerHTML = `
    <div style="text-align:center;margin-bottom:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:#c8960e;">💰 MONEY ZONE</div>
    <div style="display:flex;gap:4px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;">${tabs}</div>
    ${body}`;

  if (state.activeMoneyTab === 'coach') {
    const chat = el('coachChat');
    if (chat) chat.scrollTop = chat.scrollHeight;
  }
}

async function sendCoach() {
  const input = el('coachInput');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  input.value = '';
  moneyCoachMsgs.push({ role: 'user', text });
  const monthly = state.income.amount ? parseFloat(state.income.amount) * 26/12 : 0;
  const totalBills = state.bills.reduce((s,b) => s + parseFloat(b.amount||0), 0);
  const totalSpent = state.expenses.reduce((s,e) => s + parseFloat(e.amount||0), 0);
  const leftover = monthly - totalBills;
  const context = 'Monthly income: $' + monthly.toFixed(2) + '. Total bills: $' + totalBills.toFixed(2) + '. Total spent this period: $' + totalSpent.toFixed(2) + '. Leftover after bills: $' + leftover.toFixed(2) + '.';
  const system = 'You are a warm, non-judgmental budget coach for someone with ADHD burnout, depression, and anxiety who has never budgeted before. Financial context: ' + context + ' Give practical, simple advice. Never shame. Break things into tiny steps. Keep responses concise. You understand that ADHD makes money management genuinely hard.';
  moneyCoachMsgs.push({ role: 'ai', text: 'Thinking...' });
  renderMoney();
  try {
    const history = moneyCoachMsgs.slice(0,-1).map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));
    history.push({ role: 'user', content: text });
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: getApiHeaders(),
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 500, system, messages: history }),
    });
    const data = await res.json();
    const reply = data.content.map(c => c.text || '').join('');
    moneyCoachMsgs[moneyCoachMsgs.length - 1] = { role: 'ai', text: reply };
  } catch(e) {
    moneyCoachMsgs[moneyCoachMsgs.length - 1] = { role: 'ai', text: 'Blipped out. Try again?' };
  }
  renderMoney();
}

let clockInterval = null;

function renderPlanner() {
  const container = el('plannerContent');
  if (clockInterval) clearInterval(clockInterval);

  const TASK_AREAS = [
    {id:'all',label:'ALL',icon:'⚡',color:'#c8960e'},
    {id:'self',label:'SELF',icon:'💜',color:'#d42070'},
    {id:'mental',label:'MIND',icon:'🧠',color:'#c8960e'},
    {id:'marriage',label:'PARTNER',icon:'💗',color:'#d42070'},
    {id:'family',label:'FAMILY',icon:'🌟',color:'#c8960e'},
    {id:'work',label:'WORK',icon:'💼',color:'#d42070'},
    {id:'money',label:'MONEY',icon:'💰',color:'#c8960e'},
    {id:'other',label:'OTHER',icon:'🎯',color:'#d42070'},
  ];

  const PRIO = [
    {id:'high',label:'HIGH',color:'#e83030',icon:'🔴'},
    {id:'medium',label:'MED',color:'#c8960e',icon:'🟡'},
    {id:'low',label:'LOW',color:'#5abe7a',icon:'🟢'},
  ];

  const todayStr = new Date().toDateString();
  const filterArea = window._planFilter || 'all';
  const planTab = state.activePlanTab;

  function filteredTasks(arr) { return filterArea === 'all' ? arr : arr.filter(t => t.area === filterArea); }
  function isOverdue(t) { if (!t.dueDate || t.done) return false; return new Date(t.dueDate + 'T23:59:59') < new Date() && new Date(t.dueDate + 'T12:00:00').toDateString() !== todayStr; }
  function isToday2(t) { return t.dueDate && new Date(t.dueDate + 'T12:00:00').toDateString() === todayStr; }
  function fmtDate(d) { if (!d) return ''; const dt = new Date(d + 'T12:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

  const activeTasks = filteredTasks(state.tasks.filter(t => !t.done));
  const doneTasks = filteredTasks(state.tasks.filter(t => t.done));
  const overdue = activeTasks.filter(t => isOverdue(t));
  const todayTasks = activeTasks.filter(t => isToday2(t));
  const upcoming = activeTasks.filter(t => t.dueDate && !isToday2(t) && !isOverdue(t));
  const noDate = activeTasks.filter(t => !t.dueDate);

  function taskCard(task) {
    const area = TASK_AREAS.find(a => a.id === task.area) || TASK_AREAS[0];
    const prio = PRIO.find(p => p.id === task.priority) || PRIO[1];
    const over = isOverdue(task);
    const bcolor = task.done ? 'rgba(200,150,14,0.3)' : over ? '#d42070' : area.color;
    const stepsTotal = (task.steps||[]).length;
    const stepsDone = (task.steps||[]).filter(s => s.done).length;
    const pct = stepsTotal > 0 ? Math.round((stepsDone/stepsTotal)*100) : 0;
    return `<div style="border:2.5px solid ${bcolor};box-shadow:${over&&!task.done?'0 4px 14px rgba(212,48,112,0.3)':task.done?'none':'0 4px 12px rgba(200,150,14,0.15)'};border-radius:12px;margin-bottom:10px;background:${task.done?'rgba(0,0,0,0.3)':hexTint(area.color)};overflow:hidden;">
      <div style="padding:12px 14px;display:flex;align-items:flex-start;gap:10px;">
        <div onclick="toggleTask('${task.id}')" class="task-circle ${task.done?'done':''}" style="border-color:${task.done?'#c8960e':area.color};"></div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:15px;font-weight:600;color:${task.done?'#8a6858':'#f8e8d8'};text-decoration:${task.done?'line-through':'none'};margin-bottom:5px;">${task.title}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;">
            <span style="font-family:'Nunito',sans-serif;font-size:9px;font-weight:800;color:${area.color};background:${area.color}22;padding:2px 7px;border-radius:10px;">${area.icon} ${area.label}</span>
            <span style="font-family:'Nunito',sans-serif;font-size:9px;font-weight:800;color:${prio.color};background:${prio.color}22;padding:2px 7px;border-radius:10px;">${prio.icon} ${prio.label}</span>
            ${task.dueDate?`<span style="font-family:'Nunito',sans-serif;font-size:9px;font-weight:800;color:${over?'#d42070':isToday2(task)?'#c8960e':'#8a6858'};padding:2px 7px;border-radius:10px;background:${over?'rgba(212,48,112,0.2)':isToday2(task)?'rgba(200,150,14,0.2)':'transparent'};">${over?'⚠️ OVERDUE':isToday2(task)?'📅 TODAY':'📅 '+fmtDate(task.dueDate)}</span>`:''}
            ${stepsTotal>0?`<span style="font-family:'Nunito',sans-serif;font-size:9px;color:#8a6858;">${stepsDone}/${stepsTotal} steps</span>`:''}
          </div>
        </div>
        <button onclick="deleteTask('${task.id}')" style="background:transparent;border:none;color:#d42070;font-size:13px;cursor:pointer;padding:2px 6px;flex-shrink:0;">✕</button>
      </div>
      ${stepsTotal>0?`<div style="height:4px;background:#1a0e00;margin:0 14px 12px;border-radius:2px;"><div style="height:100%;width:${pct}%;background:${area.color};border-radius:2px;transition:width 0.4s;"></div></div>`:''}
    </div>`;
  }

  function sectionBadge(title, color, tasks) {
    if (!tasks.length) return '';
    return `<div style="display:inline-block;background:${color};border:2px solid rgba(0,0,0,0.2);border-radius:10px;padding:4px 14px;margin-bottom:10px;font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;color:white;">${title} (${tasks.length})</div>${tasks.map(taskCard).join('')}`;
  }

  const planContent = planTab === 'today'
    ? `${sectionBadge('⚠️ OVERDUE', '#d42070', overdue)}${sectionBadge('📅 DUE TODAY', '#c8960e', todayTasks)}${sectionBadge('📋 NO DATE', '#8a6858', noDate)}${sectionBadge('🔜 UPCOMING', '#8a6858', upcoming)}${doneTasks.length>0?sectionBadge('✅ COMPLETED', '#3a7d52', doneTasks.slice(-5).reverse()):''}`
    : weekView();

  function weekView() {
    const days = Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i);return d;});
    const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    let html = '';
    days.forEach((day,i) => {
      const isT = day.toDateString() === todayStr;
      const ds = day.getFullYear()+'-'+String(day.getMonth()+1).padStart(2,'0')+'-'+String(day.getDate()).padStart(2,'0');
      const dayTasks = filteredTasks(state.tasks.filter(t => t.dueDate === ds && !t.done));
      html += `<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;">
        <div class="week-day-box ${isT?'today':''}">
          <div style="font-family:'Nunito',sans-serif;font-size:8px;font-weight:700;color:${isT?'#c8960e':'#8a6858'};">${DAY_NAMES[day.getDay()]}</div>
          <div style="font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:${isT?'#c8960e':'#f8e8d8'};">${day.getDate()}</div>
        </div>
        <div style="flex:1;">
          ${dayTasks.length===0?'<div style="font-size:13px;color:rgba(138,104,88,0.5);font-style:italic;">Nothing scheduled</div>':dayTasks.map(t=>`<div onclick="toggleTask('${t.id}')" style="display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;background:rgba(200,150,14,0.06);border:1px solid rgba(200,150,14,0.25);margin-bottom:4px;cursor:pointer;"><span style="font-size:13px;">${(PRIO.find(p=>p.id===t.priority)||{icon:'🟡'}).icon}</span><span style="flex:1;font-size:13px;">${t.title}</span></div>`).join('')}
        </div>
      </div>${i<6?'<div style="height:1px;background:rgba(200,150,14,0.15);margin-bottom:8px;"></div>':''}`;
    });
    const undated = filteredTasks(state.tasks.filter(t=>!t.dueDate&&!t.done));
    if (undated.length) html += `<div style="margin-top:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:#8a6858;margin-bottom:10px;">📋 UNDATED TASKS</div>${undated.map(taskCard).join('')}`;
    return html;
  }

  // Clock
  function clockHTML() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    const pad = n => String(n).padStart(2,'0');
    const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
    const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    return `<div style="border:3px solid #c8960e;box-shadow:0 5px 0 rgba(122,85,0,0.5);border-radius:18px;padding:14px;margin-bottom:14px;background:linear-gradient(135deg,#0e0c1c,#0a0818);text-align:center;">
      <div style="font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:#c8960e;letter-spacing:2px;">${pad(h12)}:${pad(m)}<span style="font-size:18px;opacity:0.7;">:${pad(s)}</span> <span style="font-size:14px;color:#f0c060;">${ampm}</span></div>
      <div style="font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:#f0c060;margin-top:6px;">${DAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}</div>
    </div>`;
  }

  const areaFilterBtns = TASK_AREAS.map(a => `<button onclick="window._planFilter='${a.id}';renderPlanner();" style="flex-shrink:0;padding:5px 9px;border-radius:10px;cursor:pointer;background:${filterArea===a.id?a.color:'rgba(10,6,8,0.8)'};border:2px solid ${filterArea===a.id?a.color:'rgba(200,150,14,0.2)'};box-shadow:${filterArea===a.id?'0 4px 0 '+a.color+'88':'0 2px 0 rgba(0,0,0,0.4)'};font-family:'Nunito',sans-serif;font-size:9px;font-weight:800;color:${filterArea===a.id?'white':'#8a6858'};white-space:nowrap;">${a.icon} ${a.label}</button>`).join('');

  container.innerHTML = `
    <div id="clockBox">${clockHTML()}</div>
    <div style="text-align:center;margin-bottom:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:#c8960e;">📅 PLANNER</div>
    <div class="tab-toggle">
      <button onclick="state.activePlanTab='today';renderPlanner();" class="${planTab==='today'?'active':''}">📋 TODAY</button>
      <button onclick="state.activePlanTab='week';renderPlanner();" class="${planTab==='week'?'active':''}">🗓 WEEK</button>
    </div>
    <div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;">${areaFilterBtns}</div>
    <button onclick="toggleAddTaskForm()" id="addTaskBtn" style="width:100%;padding:11px;border-radius:10px;cursor:pointer;background:linear-gradient(135deg,#7a5500,#c8960e);border:2px solid #5a3f00;box-shadow:0 4px 0 rgba(90,63,0,0.6);font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;color:white;margin-bottom:14px;">+ ADD QUEST TASK</button>
    <div id="addTaskFormWrap" style="display:none;margin-bottom:14px;"></div>
    ${planContent.trim() ? planContent : '<div style="text-align:center;padding:30px;color:#8a6858;"><div style="font-size:32px;margin-bottom:10px;">🌟</div><div style="font-family:\'Nunito\',sans-serif;font-weight:800;font-size:14px;">No tasks yet</div><div style="font-size:13px;margin-top:6px;">Hit + ADD to get started</div></div>'}`;

  // Live clock
  clockInterval = setInterval(() => {
    const cb = el('clockBox');
    if (cb) cb.innerHTML = clockHTML();
  }, 1000);
}

function toggleAddTaskForm() {
  const wrap = el('addTaskFormWrap');
  if (!wrap) return;
  if (wrap.style.display === 'none') {
    wrap.style.display = 'block';
    const TASK_AREAS2 = [{id:'self',label:'SELF',icon:'💜'},{id:'mental',label:'MIND',icon:'🧠'},{id:'marriage',label:'PARTNER',icon:'💗'},{id:'family',label:'FAMILY',icon:'🌟'},{id:'work',label:'WORK',icon:'💼'},{id:'money',label:'MONEY',icon:'💰'},{id:'other',label:'OTHER',icon:'🎯'}];
    wrap.innerHTML = `<div style="border:3px solid #c8960e;box-shadow:0 5px 0 rgba(122,85,0,0.5);border-radius:18px;padding:14px;background:rgba(200,150,14,0.06);">
      <div style="display:grid;gap:10px;">

        </div>

      </div>
    </div>`;
  } else { wrap.style.display = 'none'; }
}

function saveTask() {
  const title = el('tTitle') ? el('tTitle').value.trim() : '';
  if (!title) return;
  state.tasks.push({ id:'t_'+Date.now(), title, area: (el('tArea')||{value:'other'}).value, priority: (el('tPrio')||{value:'medium'}).value, dueDate: (el('tDate')||{value:''}).value, steps: [], done: false });
  addXP(5, 'work', title);
  saveState();
  el('addTaskFormWrap').style.display = 'none';
  renderPlanner();
}

function toggleTask(id) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done) addXP(25, 'work', t.title);
  saveState();
  renderPlanner();
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  saveState();
  renderPlanner();
}

async function generateRefEmail() {
  const mode = state.refEmailMode;
  const tone = state.refEmailTone;
  const scenEl = el('refEmailScen');
  const mainEl = el('refEmailMain');
  const ctxEl = el('refEmailCtx');
  const draftEl = el('refEmailDraft');
  const scen = scenEl ? scenEl.value : state.refEmailScen;
  const main = mainEl ? mainEl.value.trim() : '';
  const ctx = ctxEl ? ctxEl.value.trim() : '';
  const draft = draftEl ? draftEl.value.trim() : '';
  if (mode === 'draft' && !main) return;
  if (mode === 'reply' && !main) return;
  if (mode === 'polish' && !draft) return;

  state.refEmailLoading = true;
  state.refEmailResult = null;
  renderReference();

  const SCENE_LABELS = {
    general: 'General',
    doctor: 'Doctor/Medical',
    school: 'School/Teacher',
    landlord: 'Landlord/Housing',
    family: 'Family/Relative',
    boundary: 'Setting a Boundary',
    conflict: 'Conflict/Disagreement',
    apology: 'Apology',
    followup: 'Following Up',
    request: 'Asking for Something',
    complaint: 'Filing a Complaint',
    decline: 'Declining/Saying No',
  };
  const TONE_DESC = {
    warm: 'Warm, friendly, and human — empathetic but clear',
    balanced: 'Clear, direct, and professional without being cold',
    formal: 'Formal and structured, respectful distance',
  };

  let taskDesc = '';
  let inputContent = '';
  if (mode === 'polish') {
    taskDesc = 'Clean up and improve this email draft. Fix grammar, make it clearer, keep the meaning:';
    inputContent = draft;
  } else if (mode === 'reply') {
    taskDesc = 'Write a reply to this email:';
    const ctxLine = ctx ? (' MY CONTEXT: ' + ctx) : '';
    inputContent = 'EMAIL RECEIVED: ' + main + ctxLine;
  } else {
    taskDesc = 'Write an email for this situation:';
    inputContent = 'TYPE: ' + (SCENE_LABELS[scen] || 'General') + ' -- SITUATION: ' + main;
  }

  const whoTheyAre = 'You are a personal email writing assistant for someone with ADHD burnout, depression, and anxiety who finds writing emails genuinely hard. They often struggle to find words, avoid sending emails because of anxiety, or write long rambling messages. Your job is to write clear, human, effective emails on their behalf. Keep emails concise. Never sound robotic. The person values warmth and directness.';
  const prompt = whoTheyAre + ' TASK: ' + taskDesc + ' ' + inputContent + ' TONE: ' + (TONE_DESC[tone] || TONE_DESC.balanced) + ' Respond with JSON only, no markdown: {"subject":"subject line","body":"full email with greeting and sign-off","notes":"any important caveats or empty string"}';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: getApiHeaders(),
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    const data = await res.json();
    const txt = data.content.filter(c => c.type === 'text').map(c => c.text).join('').trim().replace(/```json|```/gm, '').trim();
    state.refEmailResult = JSON.parse(txt);
  } catch(e) {
    state.refEmailResult = { subject: '', body: 'Could not generate. Please try again.', notes: '' };
  }
  state.refEmailLoading = false;
  renderReference();
}
function copyRefEmail() {
  if (!state.refEmailResult) return;
  const subj = state.refEmailResult.subject ? 'Subject: ' + state.refEmailResult.subject + '\n\n' : '';
  const full = subj + state.refEmailResult.body;
  navigator.clipboard && navigator.clipboard.writeText(full).then(() => {
    state.refEmailCopied = true;
    renderReference();
    setTimeout(() => { state.refEmailCopied = false; renderReference(); }, 2500);
  }).catch(() => {});
}
async function runRefSearch() {
  const input = el('refInput');
  if (!input || !input.value.trim()) return;
  const q = input.value.trim();
  input.value = '';
  const mode = window._refMode || 'ai';
  if (mode === 'web') {
    window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank');
    refWebLog.push(q);
    renderReference();
    return;
  }
  refAiMessages.push({ role: 'user', text: q });
  refAiMessages.push({ role: 'ai', text: 'Searching...' });
  renderReference();
  const system = 'You are a helpful AI search assistant inside Anchor, a life management app for someone with ADHD burnout, depression, and anxiety. Answer clearly and concisely. Use bullet points for lists. Keep answers focused. Warm and encouraging tone without being patronizing.';
  try {
    const history = refAiMessages.slice(0,-1).map(m => ({ role: m.role==='user'?'user':'assistant', content: m.text }));
    history.push({ role: 'user', content: q });
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: getApiHeaders(),
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 800, system, messages: history }),
    });
    const data = await res.json();
    const reply = data.content.map(c => c.text || '').join('');
    refAiMessages[refAiMessages.length-1] = { role: 'ai', text: reply };
  } catch(e) {
    refAiMessages[refAiMessages.length-1] = { role: 'ai', text: 'Search blipped. Try again?' };
  }
  renderReference();
}

  if (opShiftTimer) clearInterval(opShiftTimer);
  opShiftTimer = setInterval(() => {
    state.opShiftElapsed = Math.floor((Date.now() - opShiftStart) / 1000);
    const el2 = document.getElementById('opShiftTime');
    if (el2) el2.textContent = opFmt(state.opShiftElapsed || 0);
    if (state.activeWorkView === 'order' && state.orderStart) {
      const oe = Math.floor((Date.now() - state.orderStart) / 1000);
      state.orderElapsed = oe;
      const et = document.getElementById('opOrderTimer');
      if (et) {
        et.textContent = opFmt(oe);
        et.style.color = oe >= 600 ? '#d42070' : oe >= 270 ? '#c8960e' : '#8a6858';
      }
      if (oe >= 600 && !state.stuckAlert) {
        state.stuckAlert = true;
        const sa = document.getElementById('opStuckAlert');
        if (sa) sa.style.display = 'block';
      }
      if (oe >= 270 && !state.paceNudge) {
        state.paceNudge = true;
        const pn = document.getElementById('opPaceNudge');
        if (pn) pn.style.display = 'flex';
      }
    }
  }, 1000);
  buildWorkView();
}

function opFmt(s) { return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }

function buildWorkView() {
  const container = document.getElementById('workContent');
  if (!container) return;
  const shiftH = (state.opShiftElapsed || 0) / 3600;
  const pace = shiftH > 0 ? Math.round(state.opCount / shiftH) : 0;
  const proj = shiftH > 0 ? Math.round((state.opCount / shiftH) * 8) : 0;
  const onTrack = proj >= 100;
  const pct = Math.min(100, Math.round((state.opCount / 100) * 100));

  const W_NAV = [
    {id:'dash',icon:'⚡',label:'Shift'},
    {id:'orders',icon:'📋',label:'Orders'},
    {id:'ref',icon:'🔍',label:'Ref'},
    {id:'sap',icon:'💡',label:'SAP'},
    {id:'notes',icon:'🤖',label:'Notes'},
    {id:'email',icon:'📧',label:'Email'},
    {id:'bounds',icon:'🛡',label:'Bounds'},
  ];

  const navHTML = W_NAV.map(n => `<button onclick="switchWorkTab('${n.id}')" style="flex:1;min-width:44px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 0;">
    <span style="font-size:16px;transition:transform 0.15s;transform:${state.activeWorkView===n.id?'scale(1.2)':'scale(1)'};filter:${state.activeWorkView===n.id?'drop-shadow(0 0 4px #c8960e)':'none'};">${n.icon}</span>
    <span style="font-family:'Nunito',sans-serif;font-size:8px;font-weight:800;color:${state.activeWorkView===n.id?'#c8960e':'#8a6858'};">${n.label}</span>
  </button>`).join('');

  let body = '';

  if (state.activeWorkView === 'dash') {
    const recentRows = state.opDone.slice(-5).reverse().map(o => `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(200,150,14,0.1);align-items:center;">
      <div style="display:flex;align-items:center;gap:7px;"><div style="width:6px;height:6px;border-radius:50%;background:${(OP_ORDERS[o.type]||{color:'#c8960e'}).color};"></div><span style="font-size:12px;">${(OP_ORDERS[o.type]||{label:o.type}).label}</span></div>
      <span style="font-family:'Nunito',sans-serif;font-size:11px;color:#8a6858;">${opFmt(o.elapsed)}</span>
    </div>`).join('');

    const contactRows = state.opContacts.map((c,i) => `<div style="font-size:12px;padding:5px 0;border-bottom:1px solid rgba(200,150,14,0.1);display:flex;gap:8px;align-items:center;">
      <span>👤</span>
      <div style="flex:1;"><strong style="color:#f8e8d8;">${c.name}</strong><span style="color:#8a6858;"> -- ${c.role}</span></div>
      ${state.editMode?`<button onclick="removeOpContact(${i})" style="background:transparent;border:none;color:#d42070;cursor:pointer;font-size:13px;">✕</button>`:''}
    </div>`).join('');

    body = `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;">
        ${[['Orders',state.opCount,'#c8960e'],[`Pace/hr`,pace,onTrack?'#c8960e':'#d42070'],['Projected',proj,proj>=100?'#c8960e':'#d42070']].map(([l,v,c])=>`<div style="background:rgba(200,150,14,0.06);border:2px solid rgba(200,150,14,0.25);border-radius:14px;padding:10px 8px;text-align:center;"><div style="font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:${c};">${v}</div><div style="font-size:10px;color:#8a6858;margin-top:2px;font-weight:700;">${l}</div></div>`).join('')}
      </div>
      <div style="background:rgba(200,150,14,0.06);border:2px solid rgba(200,150,14,0.25);border-radius:14px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;">
        <div style="width:52px;height:52px;border-radius:26px;border:3px solid ${onTrack?'#c8960e':'#d42070'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;color:${onTrack?'#c8960e':'#d42070'};">${pct}%</span>
        </div>
        <div style="flex:1;">
          <div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:${onTrack?'#c8960e':'#d42070'};margin-bottom:2px;">${state.opCount>=100?'GOAL CRUSHED!':onTrack?'ON TRACK!':'PUSH THROUGH!'}</div>
          <div style="font-size:11px;color:#8a6858;">Shift: <span id="opShiftTime">${opFmt(state.opShiftElapsed||0)}</span> · Best: <span style="color:#c8960e;font-weight:700;">${state.opBest}</span></div>
        </div>
      </div>
      <div style="font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:#8a6858;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">START NEW ORDER</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
        ${Object.entries(OP_ORDERS).map(([k,o])=>`<button onclick="startOpOrder('${k}')" style="background:${o.color}15;border:2px solid ${o.color}60;box-shadow:0 4px 0 ${o.color}44;border-radius:12px;padding:12px 10px;cursor:pointer;text-align:left;width:100%;">
          <div style="font-size:13px;font-weight:800;color:${o.color};font-family:'Nunito',sans-serif;">${o.label}</div>
          <div style="font-size:10px;color:#8a6858;margin-top:2px;">${o.steps.length} steps</div>
        </button>`).join('')}
      </div>
      ${state.opDone.length>0?`<div style="font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:#8a6858;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">TODAY (${state.opDone.length})</div><div style="background:rgba(200,150,14,0.06);border:2px solid rgba(200,150,14,0.25);border-radius:14px;padding:12px 14px;margin-bottom:12px;">${recentRows}</div>`:''}
      ${state.opContacts.length>0?`<div style="font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:#8a6858;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">CONTACTS</div><div style="background:rgba(200,150,14,0.06);border:2px solid rgba(200,150,14,0.25);border-radius:14px;padding:12px 14px;margin-bottom:12px;">${contactRows}</div>`:''}`;
  }

  if (state.activeWorkView === 'order' && state.activeSelOrderType) {
    const order = OP_ORDERS[state.activeSelOrderType];
    const checkedCount = order.steps.filter(s => state.orderChecks[s.id]).length;
    const allDone = checkedCount === order.steps.length;
    const pctO = Math.round((checkedCount / order.steps.length) * 100);
    const stepsHTML = order.steps.map((step, i) => {
      const done = !!state.orderChecks[step.id];
      const locked = i > 0 && !state.orderChecks[order.steps[i-1].id];
      return `<div onclick="${locked?'':'toggleOpStep(\''+step.id+'\')'}" style="display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:12px;margin-bottom:5px;cursor:${locked?'default':'pointer'};background:${done?'rgba(200,150,14,0.1)':'rgba(212,48,112,0.06)'};border:2px solid ${done?'rgba(200,150,14,0.6)':locked?'rgba(200,150,14,0.15)':'rgba(212,48,112,0.4)'};opacity:${locked&&!done?0.35:1};">

    </div>`;

    body = `
      ${state.stuckAlert?`<div id="opStuckAlert" style="background:rgba(212,48,112,0.1);border:2px solid #d42070;border-radius:14px;padding:14px;margin-bottom:10px;">
        <div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;color:#d42070;margin-bottom:4px;">Taking a while? Reach out!</div>
        <div style="font-size:13px;color:#8a6858;margin-bottom:8px;">Escalate: <strong style="color:#c8960e;">${order.escalate}</strong></div>
        <button onclick="state.stuckAlert=false;buildWorkView();" style="background:rgba(200,150,14,0.1);border:1px solid rgba(200,150,14,0.3);border-radius:8px;padding:5px 12px;cursor:pointer;color:#c8960e;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;">Got it</button>
      </div>`:''}
      ${state.paceNudge&&!state.stuckAlert?`<div id="opPaceNudge" style="background:rgba(200,150,14,0.06);border:1px solid rgba(200,150,14,0.3);border-radius:11px;padding:9px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:13px;color:#c8960e;font-weight:700;">~4 min in -- wrapping up?</div>
        <button onclick="state.paceNudge=false;buildWorkView();" style="background:none;border:none;color:#8a6858;font-size:14px;cursor:pointer;">✕</button>
      </div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div>
          <div style="font-size:17px;font-weight:900;color:${order.color};font-family:'Nunito',sans-serif;">${order.label}</div>
          <div style="font-size:12px;color:#8a6858;">${checkedCount}/${order.steps.length} steps · <span id="opOrderTimer" style="color:#8a6858;">${opFmt(state.orderElapsed||0)}</span></div>
        </div>
        <button onclick="cancelOpOrder()" style="background:rgba(200,150,14,0.1);border:1px solid rgba(200,150,14,0.3);border-radius:10px;padding:6px 12px;cursor:pointer;color:#c8960e;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;">Back</button>
      </div>
      <div style="background:rgba(200,150,14,0.1);border-radius:99px;height:8px;overflow:hidden;border:1px solid rgba(200,150,14,0.3);margin-bottom:12px;">
        <div style="width:${pctO}%;height:100%;background:linear-gradient(90deg,#d42070,#c8960e);border-radius:99px;transition:width 0.4s;"></div>
      </div>
      ${stepsHTML}
      ${policyHTML}
      <div style="margin-top:10px;">
        <button onclick="${allDone?'completeOpOrder()':''}" ${allDone?'':'disabled'} style="width:100%;padding:12px;border-radius:12px;cursor:${allDone?'pointer':'not-allowed'};background:${allDone?'linear-gradient(135deg,#d42070,#f050a0)':'rgba(200,150,14,0.1)'};border:2px solid ${allDone?'#8a1040':'rgba(200,150,14,0.2)'};box-shadow:${allDone?'0 4px 0 rgba(138,16,64,0.5)':'none'};color:${allDone?'white':'#8a6858'};font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;opacity:${allDone?1:0.7};">
          ${allDone?'COMPLETE ORDER!':checkedCount+'/'+order.steps.length+' steps completed'}
        </button>
      </div>`;
  }

  if (state.activeWorkView === 'orders') {
    body = `<div style="font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:#8a6858;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">SELECT ORDER TYPE</div>
    ${Object.entries(OP_ORDERS).map(([k,o])=>`<button onclick="startOpOrder('${k}')" style="width:100%;background:${o.color}15;border:2px solid ${o.color}60;box-shadow:0 4px 0 ${o.color}44;border-radius:12px;padding:14px;cursor:pointer;text-align:left;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:14px;font-weight:800;color:${o.color};font-family:'Nunito',sans-serif;">${o.label}</div><div style="font-size:11px;color:#8a6858;margin-top:2px;">${o.steps.length} steps · Escalate: ${o.escalate}</div></div>
      <span style="color:${o.color};font-size:18px;">›</span>
    </button>`).join('')}`;
  }

  if (state.activeWorkView === 'ref') {
    const search = window._opRefSearch || '';
    const cats = OP_QUICK_REF.map(cat => {
      const items = cat.items.filter(i => !search || i.toLowerCase().includes(search.toLowerCase()));
      if (search && !items.length) return '';
      return `<div style="background:rgba(200,150,14,0.06);border:2px solid rgba(200,150,14,0.25);border-radius:14px;padding:14px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;">
          <span style="font-size:18px;">${cat.icon}</span><span style="color:#c8960e;">${cat.cat}</span>
          <span style="margin-left:auto;font-size:10px;color:#8a6858;background:rgba(200,150,14,0.1);border-radius:20px;padding:2px 7px;">${items.length}</span>
        </div>
        ${items.map(item=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(200,150,14,0.08);"><span style="color:#d42070;flex-shrink:0;">-</span><span style="font-size:12px;color:#f8e8d8;line-height:1.5;">${item}</span></div>`).join('')}
      </div>`;
    }).join('');
    const myQR = state.opQR.length ? `<div style="background:rgba(200,150,14,0.06);border:2px solid rgba(200,150,14,0.25);border-radius:14px;padding:14px;margin-bottom:10px;">
      <div style="font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:#c8960e;margin-bottom:8px;">📌 My Notes</div>
      ${state.opQR.map((q,i)=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(200,150,14,0.08);">
        <span style="color:#d42070;">-</span><span style="font-size:12px;color:#f8e8d8;flex:1;">[${q.category}] ${q.item}</span>
        ${state.editMode?`<button onclick="state.opQR.splice(${i},1);saveState();buildWorkView();" style="background:none;border:none;color:#d42070;cursor:pointer;font-size:12px;">✕</button>`:''}
      </div>`).join('')}
    </div>`:'' ;
    body = `<input oninput="window._opRefSearch=this.value;buildWorkView();" placeholder="Search..." value="${search}" style="width:100%;background:rgba(10,6,8,0.8);border:2px solid rgba(200,150,14,0.4);border-radius:10px;padding:10px 12px;color:#f8e8d8;font-size:14px;outline:none;margin-bottom:12px;box-sizing:border-box;" />
    ${cats}${myQR}`;
  }

  if (state.activeWorkView === 'sap') {
    const sapTabHTML = `<div style="display:flex;background:rgba(200,150,14,0.06);border-radius:10px;padding:3px;border:1px solid rgba(200,150,14,0.2);margin-bottom:12px;">
