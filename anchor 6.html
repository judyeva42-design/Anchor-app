    </div>`;

    if (state.activeSapTab === 'guides') {
      const gs = window._opGuideSearch || '';
      const filteredH = OP_SAP_HELP.filter(h => !gs || h.topic.toLowerCase().includes(gs.toLowerCase()) || h.steps.some(s => s.toLowerCase().includes(gs.toLowerCase())));

      let guideAnsHTML = '';
      if (opGuideAns) {
        guideAnsHTML = `<div style="margin-top:10px;background:rgba(200,150,14,0.06);border:1px solid rgba(200,150,14,0.2);border-radius:12px;padding:12px;">
          <div style="font-size:15px;font-weight:800;color:#f8e8d8;margin-bottom:4px;font-family:'Nunito',sans-serif;">${opGuideAns.icon} ${opGuideAns.title}</div>
          <div style="font-size:12px;color:#8a6858;margin-bottom:10px;line-height:1.5;">${opGuideAns.summary}</div>
          ${opGuideAns.warning?`<div style="background:rgba(212,48,112,0.1);border:1px solid rgba(212,48,112,0.3);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:#d42070;font-weight:700;">⚠ ${opGuideAns.warning}</div>`:''}
          ${(opGuideAns.steps||[]).map((s,i)=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(200,150,14,0.08);"><div class="step-num">${i+1}</div><div style="font-size:13px;color:#f8e8d8;line-height:1.5;">${s}</div></div>`).join('')}
          ${opGuideAns.tip?`<div style="background:rgba(200,150,14,0.08);border-radius:8px;padding:7px 10px;margin-top:8px;font-size:11px;color:#c8960e;font-weight:700;">💡 ${opGuideAns.tip}</div>`:''}
          ${opGuideAns.matchedOrderType&&opGuideAns.matchedOrderType!=='null'&&OP_ORDERS[opGuideAns.matchedOrderType]?`<button onclick="startOpOrder('${opGuideAns.matchedOrderType}')" style="width:100%;margin-top:10px;padding:11px;background:linear-gradient(135deg,#d42070,#f050a0);border:2px solid #8a1040;box-shadow:0 4px 0 rgba(138,16,64,0.5);border-radius:12px;cursor:pointer;color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;">Start ${OP_ORDERS[opGuideAns.matchedOrderType].label}</button>`:''}
          <button onclick="opGuideAns=null;buildWorkView();" style="background:rgba(200,150,14,0.1);border:1px solid rgba(200,150,14,0.3);border-radius:8px;padding:5px 12px;cursor:pointer;color:#c8960e;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;margin-top:8px;width:100%;">Ask another</button>
        </div>`;
      }

      const topicsHTML = filteredH.map(h => {
        const expanded = opPolicyExpanded['sap_'+h.topic];
        return `<div onclick="opPolicyExpanded['sap_${h.topic}']=!opPolicyExpanded['sap_${h.topic}'];buildWorkView();" style="background:rgba(200,150,14,0.06);border:2px solid ${expanded?'rgba(200,150,14,0.6)':'rgba(200,150,14,0.2)'};border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:32px;height:32px;border-radius:8px;background:rgba(200,150,14,0.12);display:flex;align-items:center;justify-content:center;font-size:16px;">${h.icon}</div>
              <div><div style="font-size:13px;font-weight:800;color:#f8e8d8;font-family:'Nunito',sans-serif;">${h.topic}</div><div style="font-size:11px;color:#8a6858;">${h.summary}</div></div>
            </div>
            <span style="color:#8a6858;">${expanded?'▲':'▼'}</span>
          </div>
          ${expanded?`<div style="margin-top:10px;border-top:1px solid rgba(200,150,14,0.15);padding-top:10px;">
            ${h.steps.map((s,i)=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(200,150,14,0.08);">
              <div class="step-num">${i+1}</div>
              <div style="font-size:13px;color:#f8e8d8;line-height:1.5;">${s}</div>
            </div>`).join('')}
            <div style="margin-top:8px;">
              <button onclick="event.stopPropagation();opPolicyExpanded['pol_${h.topic}']=!opPolicyExpanded['pol_${h.topic}'];buildWorkView();" class="policy-toggle">
                <span>📋</span><span style="font-size:12px;font-weight:700;color:#c8960e;flex:1;">Policy</span>
                <span style="font-size:11px;color:#c8960e;">${opPolicyExpanded['pol_'+h.topic]?'▲':'▼'}</span>
              </button>
              ${opPolicyExpanded['pol_'+h.topic]?`<div class="policy-items">${h.policy.map(p=>`<div class="policy-item">- ${p}</div>`).join('')}</div>`:''}
            </div>
          </div>`:''}
        </div>`;
      }).join('');

      body = sapTabHTML + `<div style="background:rgba(200,150,14,0.06);border:2px solid rgba(200,150,14,0.25);border-radius:14px;padding:14px;margin-bottom:12px;">
        <div style="font-size:12px;font-weight:700;color:#c8960e;margin-bottom:8px;font-family:'Nunito',sans-serif;">Ask anything from your guides</div>
        <div style="display:flex;gap:8px;">
          <input id="opGuideQ" class="inp" placeholder="e.g. how do I handle a ZE block..." style="flex:1;" onkeydown="if(event.key==='Enter')runOpGuide();" />
          <button onclick="runOpGuide()" style="background:linear-gradient(135deg,#d42070,#c8960e);color:white;border:none;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:16px;font-weight:900;">→</button>
        </div>

function switchWorkTab(tab) {
  state.activeWorkView = tab;
  if (tab !== 'order') state.activeSelOrderType = null;
  buildWorkView();
}

function startOpOrder(type) {
  state.activeSelOrderType = type;
  state.activeWorkView = 'order';
  state.orderChecks = {};
  state.orderStart = Date.now();
  state.orderElapsed = 0;
  state.stuckAlert = false;
  state.paceNudge = false;
  state.showOrderPolicy = false;
  buildWorkView();
}

function cancelOpOrder() {
  state.activeSelOrderType = null;
  state.activeWorkView = 'dash';
  state.orderStart = null;
  state.orderElapsed = 0;
  state.stuckAlert = false;
  state.paceNudge = false;
  buildWorkView();
}

function toggleOpStep(stepId) {
  state.orderChecks[stepId] = !state.orderChecks[stepId];
  buildWorkView();
}

function completeOpOrder() {
  const n = state.opCount + 1;
  state.opCount = n;
  if (n > state.opBest) state.opBest = n;
  state.opDone.push({ type: state.activeSelOrderType, elapsed: state.orderElapsed, time: new Date().toLocaleTimeString() });
  state.activeSelOrderType = null;
  state.activeWorkView = 'dash';
  state.orderStart = null;
  state.orderElapsed = 0;
  state.stuckAlert = false;
  state.paceNudge = false;
  state.orderChecks = {};
  if (n === 100) showFlash('GOAL CRUSHED! 🎉');
  else showFlash('ORDER DONE! +1');
  saveState();
  buildWorkView();
}

function removeOpContact(i) {
  state.opContacts.splice(i, 1);
  saveState();
  buildWorkView();
}

async function runOpGuide() {
  const input = document.getElementById('opGuideQ');
  if (!input || !input.value.trim()) return;
  const q = input.value.trim();
  input.value = '';
  opGuideAns = { icon:'...', title:'Searching...', summary:'', steps:[], policy:[], tip:'', warning:'', matchedOrderType:'null' };
  buildWorkView();
  const orderInfo = Object.entries(OP_ORDERS).map(([k,o]) => k + ': ' + o.steps.map((s,i)=>(i+1)+'. '+s.text).join(' | ') + ' POLICY: ' + o.policy.join(' | ')).join('\n');
  const sapInfo = OP_SAP_HELP.map(h => h.topic + ': ' + h.steps.join(' | ') + ' POLICY: ' + h.policy.join(' | ')).join('\n');
  const refInfo = OP_QUICK_REF.map(c => c.cat + ': ' + c.items.join(' / ')).join('\n');
  const prompt = 'SAP order processing assistant. ORDERS:\n' + orderInfo + '\nGUIDES:\n' + sapInfo + '\nREF:\n' + refInfo + '\nQUESTION: ' + q + '\nRespond with JSON only, no markdown: {"title":"title","icon":"emoji","summary":"1 sentence","steps":["step"],"policy":["rule"],"tip":"tip","warning":"warning or empty","matchedOrderType":"standard|blanket|dropship|edi|portal|quote|null"}';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', { method:'POST', headers:getApiHeaders(), body:JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:1000, messages:[{role:'user',content:prompt}] }) });
    const data = await res.json();
    const txt = data.content.map(c=>c.text||'').join('').trim().replace(/```json|```/gm,'').trim();
    opGuideAns = JSON.parse(txt);
  } catch(e) {
    opGuideAns = { icon:'😕', title:'Could not process', summary:'Try rephrasing.', steps:[], policy:[], tip:'', warning:'', matchedOrderType:'null' };
  }
  buildWorkView();
}

async function runOpWeb() {
  const input = document.getElementById('opWebQ');
  if (!input || !input.value.trim()) return;
  const q = input.value.trim();
  opWebAns = { icon:'...', title:'Searching...', summary:'', steps:[], keyFacts:[], warning:'', tip:'' };

    const res = await fetch('https://api.anthropic.com/v1/messages', { method:'POST', headers:getApiHeaders(), body:JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:1500, tools:[{type:'web_search_20250305',name:'web_search'}], messages:[{role:'user',content:prompt}] }) });
    const data = await res.json();
    const txt = data.content.filter(c=>c.type==='text').map(c=>c.text).join('').trim().replace(/```json|```/gm,'').trim();
    opWebAns = JSON.parse(txt);

  buildWorkView();

let opNoteB64 = null;
function handleOpNoteImg(input) {
  const f = input.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => { opNoteB64 = r.result.split(',')[1]; buildWorkView(); };
  r.readAsDataURL(f);
}

async function runOpNotes() {
  const textEl = document.getElementById('opNoteText');
  const text = textEl ? textEl.value.trim() : '';
  if (!text && !opNoteB64) return;
  opNoteResult = { summary:'Processing...', flags:[], contacts:[], quickRefItems:[] };
  buildWorkView();
  const instr = 'Organize these order processing notes. Respond ONLY with JSON, no markdown: {"summary":"1-2 sentences","quickRefItems":[{"category":"Pricing|Shipping|Tags|Accounts|Other","item":"note"}],"processNotes":[{"orderType":"standard|blanket|dropship|edi|portal|quote|general","note":"note"}],"contacts":[{"name":"name","role":"role"}],"flags":["warning"]} Only include sections with content.';
  try {
    const msgs = opNoteB64
      ? [{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:opNoteB64}},{type:'text',text:instr}]}]
      : [{role:'user',content:instr + '\n\nNotes: ' + text}];
    const res = await fetch('https://api.anthropic.com/v1/messages', { method:'POST', headers:getApiHeaders(), body:JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:1000, messages:msgs }) });
    const data = await res.json();
    const txt = data.content.map(c=>c.text||'').join('').trim().replace(/```json|```/gm,'').trim();
    opNoteResult = JSON.parse(txt);
  } catch(e) {
    opNoteResult = { summary:'Could not process. Try again.', flags:[], contacts:[], quickRefItems:[] };
  }
  buildWorkView();
}

function applyOpNotes() {
  if (!opNoteResult) return;
  if (opNoteResult.contacts && opNoteResult.contacts.length) opNoteResult.contacts.filter(function(c){return !state.opContacts.find(function(x){return x.name===c.name;});}).forEach(function(c){state.opContacts.push(c);});
  if (opNoteResult.quickRefItems && opNoteResult.quickRefItems.length) opNoteResult.quickRefItems.forEach(function(item){state.opQR.push(item);});
  if ((opNoteResult.processNotes && opNoteResult.processNotes.length) || (opNoteResult.flags && opNoteResult.flags.length)) state.opNotes.push({ date:new Date().toLocaleDateString(), summary:opNoteResult.summary, notes:opNoteResult.processNotes||[], flags:opNoteResult.flags||[] });
  opNoteResult = Object.assign({}, opNoteResult, {applied:true});

}

  statsRow.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;';

    { label: 'Total', val: total, color: '#c8960e' },
    { label: 'Held', val: held, color: '#5abe7a' },
    { label: 'Rate', val: total > 0 ? Math.round((held/total)*100) + '%' : '—', color: '#d42070' },
  ].forEach(function(stat) {
    var card = document.createElement('div');
    card.style.cssText = 'border:2px solid rgba(200,150,14,0.25);border-radius:12px;padding:10px;text-align:center;background:rgba(200,150,14,0.06);';

    val.textContent = stat.val;
    var lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:10px;color:#8a6858;font-weight:700;margin-top:2px;';
    lbl.textContent = stat.label;
    card.appendChild(val);
    card.appendChild(lbl);
    statsRow.appendChild(card);
  });
  container.appendChild(statsRow);

  // Boundary cards
  state.bounds.slice().reverse().forEach(function(bound, revIdx) {
    var idx = state.bounds.length - 1 - revIdx;
    var statusColor = statusColors[bound.status] || '#c8960e';
    var card = document.createElement('div');
    card.style.cssText = 'border:2px solid ' + statusColor + ';border-radius:14px;padding:12px;margin-bottom:10px;background:' + statusColor + '10;';

    // Top row
    var topRow = document.createElement('div');
    topRow.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;';

    sitText.style.cssText = 'font-size:13px;color:#f8e8d8;font-weight:600;flex:1;margin-right:8px;line-height:1.4;';
    sitText.textContent = bound.situation;
    var dateText = document.createElement('div');
    dateText.style.cssText = 'font-size:10px;color:#8a6858;flex-shrink:0;';
    dateText.textContent = bound.date;
    topRow.appendChild(sitText);
    topRow.appendChild(dateText);
    card.appendChild(topRow);

    // Status selector
    var statusWrap = document.createElement('div');
    statusWrap.style.cssText = 'display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;';
    Object.keys(statusLabels).forEach(function(s) {
      var sBtn = document.createElement('button');
      sBtn.style.cssText = 'padding:4px 10px;border-radius:20px;font-family:Nunito,sans-serif;font-size:10px;font-weight:800;cursor:pointer;border:1.5px solid ' + statusColors[s] + ';background:' + (bound.status === s ? statusColors[s] : 'transparent') + ';color:' + (bound.status === s ? '#0a0608' : statusColors[s]) + ';';
      sBtn.textContent = statusLabels[s];
      sBtn.addEventListener('click', (function(statusVal, boundIdx) {
        return function() {
          state.bounds[boundIdx].status = statusVal;
          if (statusVal === 'held') addXP(30, 'mental', 'Held a boundary');
          saveState();
          if (typeof renderBounds === 'function') renderBounds();
        };
      })(s, idx));
      statusWrap.appendChild(sBtn);
    });
    card.appendChild(statusWrap);

    // Notes input
    var notesInput = document.createElement('textarea');
    notesInput.className = 'inp';
    notesInput.rows = 2;
    notesInput.placeholder = 'How did it go? Notes for yourself...';
    notesInput.style.cssText += 'resize:none;font-size:12px;margin-bottom:8px;padding:8px 10px;';
    notesInput.value = bound.notes || '';
    notesInput.addEventListener('change', (function(boundIdx) {
      return function() {
        state.bounds[boundIdx].notes = this.value;
        saveState();
      };
    })(idx));
    card.appendChild(notesInput);

    // Delete button
    var delBtn = document.createElement('button');
    delBtn.style.cssText = 'background:transparent;border:none;color:#8a6858;font-size:11px;cursor:pointer;font-family:Nunito,sans-serif;';
    delBtn.textContent = 'Remove';
    delBtn.addEventListener('click', (function(boundIdx) {
      return function() {
        state.bounds.splice(boundIdx, 1);
        saveState();
        if (typeof renderBounds === 'function') renderBounds();
      };
    })(idx));
    card.appendChild(delBtn);

    container.appendChild(card);
  });
}

async function runWorkBoundsIdentify(container) {
  var sitEl = el('wbIdentifySit');
  if (!sitEl || !sitEl.value.trim()) return;
  var sit = sitEl.value.trim();
  var resultDiv = el('wbIdentifyResult');
  if (!resultDiv) return;

  resultDiv.innerHTML = '';
  var loading = document.createElement('div');
  loading.style.cssText = 'text-align:center;padding:20px;color:#8a6858;font-size:14px;';
  loading.textContent = 'Analyzing your situation...';
  resultDiv.appendChild(loading);

  var prompt = 'You are a professional boundaries coach for a Customer Engagement Representative at an industrial manufacturing company who has ADHD, burnout, depression, and anxiety. They struggle with assertiveness at work and fear professional consequences of setting limits. Analyze this work situation and identify professional boundary needs. Be practical and realistic about workplace dynamics. Situation: ' + sit + '. Respond with JSON only, no markdown: {"validation":"1-2 sentences validating why this is hard","boundaries":[{"type":"boundary type in 4 words","description":"what this looks like professionally","why":"why this protects them","risk":"low/medium/high risk to set"}],"insight":"1 practical insight about workplace dynamics","firstStep":"smallest professional first step"}';

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: getApiHeaders(),
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    var data = await res.json();
    var txt = data.content.map(function(c) { return c.text || ''; }).join('').trim().replace(/```json|```/gm, '').trim();
    var result = JSON.parse(txt);
    showWorkBoundsIdentifyResult(resultDiv, result, sit);
  } catch(e) {
    resultDiv.innerHTML = '';
    var err = document.createElement('div');
    err.style.cssText = 'color:#d42070;font-size:13px;padding:10px;';
    err.textContent = 'Could not load. Try again.';
    resultDiv.appendChild(err);

}

  loading.textContent = 'Writing your work script...';
  resultDiv.appendChild(loading);

  var prompt = 'You are a professional assertiveness coach for a Customer Engagement Representative at an industrial manufacturing company who has ADHD burnout, depression, and anxiety. They fear professional consequences when setting limits. Write a professional boundary script they can use at work. Situation: ' + sit + '. Directed at: ' + who + '. The script must be: professional, not aggressive, realistic for a workplace, brief (people with ADHD need concise scripts). Include email AND verbal versions. Respond with JSON only, no markdown: {"reminder":"a calming thought before the conversation","verbalScript":"what to say in person or on a call","emailScript":"email or message version","ifTheyPushBack":"professional response if they resist","notes":"any important coaching on timing or approach"}';

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: getApiHeaders(),
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    var data = await res.json();
    var txt = data.content.map(function(c) { return c.text || ''; }).join('').trim().replace(/```json|```/gm, '').trim();
    var result = JSON.parse(txt);
    showWorkBoundsScriptResult(resultDiv, result, sit);
  } catch(e) {
    resultDiv.innerHTML = '';
    var err = document.createElement('div');
    err.style.cssText = 'color:#d42070;font-size:13px;padding:10px;';
    err.textContent = 'Could not generate. Try again.';
    resultDiv.appendChild(err);
  }
}

    lbl.textContent = stat.label;
    card.appendChild(val);
    card.appendChild(lbl);
    statsRow.appendChild(card);
  });
  container.appendChild(statsRow);

  bounds.slice().reverse().forEach(function(bound, revIdx) {
    var idx = bounds.length - 1 - revIdx;

    var card = document.createElement('div');
    card.style.cssText = 'border:2px solid ' + statusColor + ';border-radius:14px;padding:12px;margin-bottom:10px;background:' + statusColor + '10;';

    var topRow = document.createElement('div');

    var dateTxt = document.createElement('div');

    dateTxt.textContent = bound.date;
    topRow.appendChild(sitTxt);
    topRow.appendChild(dateTxt);
    card.appendChild(topRow);

    var sWrap = document.createElement('div');
    sWrap.style.cssText = 'display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;';
    Object.keys(statusLabels).forEach(function(s) {

      sBtn.textContent = statusLabels[s];
      sBtn.addEventListener('click', (function(sv, bi) {
        return function() {
          state.workBounds[bi].status = sv;
          if (sv === 'held') addXP(30, 'work', 'Held a work boundary');
          S.set('a_workbounds', state.workBounds);
          if (typeof renderWorkBounds === 'function') renderWorkBounds();
        };
      })(s, idx));
      sWrap.appendChild(sBtn);
    });
    card.appendChild(sWrap);

    var notesInput = document.createElement('textarea');
    notesInput.className = 'inp';
    notesInput.rows = 2;
    notesInput.placeholder = 'How did it go?';
    notesInput.style.cssText += 'resize:none;font-size:12px;margin-bottom:8px;padding:8px 10px;';
    notesInput.value = bound.notes || '';
    notesInput.addEventListener('change', (function(bi) {
      return function() {
        state.workBounds[bi].notes = this.value;
        S.set('a_workbounds', state.workBounds);
      };
    })(idx));
    card.appendChild(notesInput);

    var delBtn = document.createElement('button');
    delBtn.style.cssText = 'background:transparent;border:none;color:#8a6858;font-size:11px;cursor:pointer;font-family:Nunito,sans-serif;';
    delBtn.textContent = 'Remove';
    delBtn.addEventListener('click', (function(bi) {
      return function() {
        state.workBounds.splice(bi, 1);
        S.set('a_workbounds', state.workBounds);
        if (typeof renderWorkBounds === 'function') renderWorkBounds();
      };
    })(idx));
    card.appendChild(delBtn);
    container.appendChild(card);
  });
}

// ── LOG TAB ─────────────────────────────────────────────
function renderHistoryLog(container, log) {
  var CAT_COLORS = {
    quest: '#c8960e', mood: '#9933cc', med: '#d42070',
    money: '#5abe7a', boundary: '#7a30c0', win: '#f0c060',
    dailystart: '#d42070', task: '#c8960e', work: '#d42070',
  };
  var CAT_ICONS = {
    quest:'⚔️', mood:'💜', med:'💊', money:'💰',
    boundary:'🛡️', win:'🏆', dailystart:'⚡', task:'📋', work:'💼',
  };

  if (log.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:40px 20px;border:2px solid rgba(200,150,14,0.2);border-radius:14px;background:rgba(200,150,14,0.04);';
    var emptyIcon = document.createElement('div');
    emptyIcon.style.cssText = 'font-size:40px;margin-bottom:12px;';
    emptyIcon.textContent = '📋';
    var emptyTxt = document.createElement('div');
    emptyTxt.style.cssText = 'font-family:Nunito,sans-serif;font-weight:800;font-size:14px;color:#8a6858;';
    emptyTxt.textContent = 'No history yet';
    var emptySub = document.createElement('div');
    emptySub.style.cssText = 'font-size:12px;color:#8a6858;margin-top:6px;line-height:1.5;';
    emptySub.textContent = 'Complete quests, check in moods, log meds, and more — everything will appear here.';
    empty.appendChild(emptyIcon);
    empty.appendChild(emptyTxt);
    empty.appendChild(emptySub);
    container.appendChild(empty);
    return;
  }

  // Filter bar
  var categories = ['all', 'quest', 'mood', 'med', 'money', 'boundary', 'win', 'task', 'work'];
  var filterWrap = document.createElement('div');
  filterWrap.style.cssText = 'display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;';
  var activeFilter = state.histFilter || 'all';
  categories.forEach(function(cat) {
    var chip = document.createElement('button');
    chip.style.cssText = 'flex-shrink:0;padding:5px 12px;border-radius:20px;font-family:Nunito,sans-serif;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid;';
    var color = cat === 'all' ? '#c8960e' : (CAT_COLORS[cat] || '#c8960e');
    chip.style.borderColor = activeFilter === cat ? color : 'rgba(200,150,14,0.25)';
    chip.style.background = activeFilter === cat ? color + '22' : 'transparent';
    chip.style.color = activeFilter === cat ? color : '#8a6858';
    chip.textContent = (cat === 'all' ? 'All' : (CAT_ICONS[cat] || '') + ' ' + cat.charAt(0).toUpperCase() + cat.slice(1));
    chip.addEventListener('click', function() {
      state.histFilter = cat;
      if (typeof renderHistory === 'function') renderHistory();
    });
    filterWrap.appendChild(chip);
  });
  container.appendChild(filterWrap);

  // Group by date
  var filtered = activeFilter === 'all' ? log : log.filter(function(e) { return e.category === activeFilter; });
  var byDate = {};
  filtered.forEach(function(entry) {
    if (!byDate[entry.date]) byDate[entry.date] = [];
    byDate[entry.date].push(entry);
  });

  var dates = Object.keys(byDate).sort(function(a, b) { return new Date(b) - new Date(a); });

  if (dates.length === 0) {
    var noMatch = document.createElement('div');
    noMatch.style.cssText = 'text-align:center;padding:20px;color:#8a6858;font-size:13px;';
    noMatch.textContent = 'No entries for this category yet.';
    container.appendChild(noMatch);
    return;
  }

  dates.forEach(function(date) {
    var entries = byDate[date].slice().reverse();
    var dateHeader = document.createElement('div');
    dateHeader.style.cssText = 'font-family:Nunito,sans-serif;font-weight:800;font-size:12px;color:#c8960e;letter-spacing:0.1em;margin:12px 0 6px;padding-left:4px;';
    dateHeader.textContent = date === new Date().toDateString() ? 'TODAY' : date;
    container.appendChild(dateHeader);

    entries.forEach(function(entry) {
      var color = CAT_COLORS[entry.category] || '#c8960e';
      var icon = CAT_ICONS[entry.category] || '●';
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:12px;background:' + color + '0c;border:1px solid ' + color + '30;margin-bottom:6px;';

      iconEl.style.cssText = 'font-size:16px;flex-shrink:0;margin-top:1px;';

      var body = document.createElement('div');
      body.style.cssText = 'flex:1;min-width:0;';

      var actionLabel = document.createElement('div');
      actionLabel.style.cssText = 'font-family:Nunito,sans-serif;font-weight:800;font-size:12px;color:' + color + ';';
      actionLabel.textContent = entry.action;
      var timeLabel = document.createElement('div');
      timeLabel.style.cssText = 'font-size:10px;color:#8a6858;flex-shrink:0;';
      timeLabel.textContent = entry.time;
      actionRow.appendChild(actionLabel);
      actionRow.appendChild(timeLabel);
      var detail = document.createElement('div');
      detail.style.cssText = 'font-size:12px;color:#f8e8d8;line-height:1.4;';
      detail.textContent = entry.detail;
      body.appendChild(actionRow);
      body.appendChild(detail);
      if (entry.xp) {
        var xpBadge = document.createElement('div');
        xpBadge.style.cssText = 'font-size:10px;color:#c8960e;font-weight:700;margin-top:3px;';
        xpBadge.textContent = '+' + entry.xp + ' XP';
        body.appendChild(xpBadge);
      }
      row.appendChild(iconEl);
      row.appendChild(body);
      container.appendChild(row);
    });
  });
}

// ── SUMMARY TAB ─────────────────────────────────────────
function renderHistorySummary(container, log) {
  // Stats from current state
  var totalXP = (state.level - 1) * 100 + state.xp;
  var totalWins = (state.wins || []).length;
  var totalBounds = (state.bounds || []).filter(function(b) { return b.status === 'held'; }).length;
  var totalMeds = log.filter(function(e) { return e.category === 'med'; }).length;
  var totalQuests = log.filter(function(e) { return e.category === 'quest'; }).length;
  var totalMoney = log.filter(function(e) { return e.category === 'money'; }).length;

  // Streak calculation
  var questDates = Array.from(new Set(log.filter(function(e) { return e.category === 'quest'; }).map(function(e) { return e.date; }))).sort(function(a,b){return new Date(b)-new Date(a);});
  var streak = 0;
  var checkDate = new Date();
  for (var i = 0; i < questDates.length; i++) {
    if (questDates[i] === checkDate.toDateString()) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else break;
  }

  // Mood breakdown
  var moodEntries = log.filter(function(e) { return e.category === 'mood'; });
  var moodCounts = {};
  moodEntries.forEach(function(e) {
    moodCounts[e.action] = (moodCounts[e.action] || 0) + 1;
  });

  // Stats grid
  var statsTitle = document.createElement('div');
  statsTitle.className = 'lbl';
  statsTitle.textContent = 'ALL TIME STATS';
  container.appendChild(statsTitle);

  var grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;';
  var stats = [
    {label:'Total XP', val:totalXP, color:'#c8960e'},
    {label:'Level', val:'LVL ' + state.level, color:'#d42070'},
    {label:'Quest Streak', val:streak + 'd', color:'#5abe7a'},
    {label:'Quests Done', val:totalQuests, color:'#c8960e'},
    {label:'Wins', val:totalWins, color:'#f0c060'},
    {label:'Boundaries Held', val:totalBounds, color:'#9933cc'},
    {label:'Meds Logged', val:totalMeds, color:'#d42070'},
    {label:'Money Entries', val:totalMoney, color:'#5abe7a'},
    {label:'Days Active', val:questDates.length, color:'#c8960e'},
  ];
  stats.forEach(function(stat) {
    var card = document.createElement('div');
    card.style.cssText = 'border:2px solid rgba(200,150,14,0.25);border-radius:12px;padding:10px 6px;text-align:center;background:rgba(200,150,14,0.06);';
    var val = document.createElement('div');
    val.style.cssText = 'font-family:Nunito,sans-serif;font-size:18px;font-weight:900;color:' + stat.color + ';';
    val.textContent = stat.val;
    var lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:9px;color:#8a6858;font-weight:700;margin-top:2px;line-height:1.3;';
    lbl.textContent = stat.label;
    card.appendChild(val);
    card.appendChild(lbl);
    grid.appendChild(card);
  });
  container.appendChild(grid);

  // Mood breakdown
  if (Object.keys(moodCounts).length > 0) {
    var moodTitle = document.createElement('div');
    moodTitle.className = 'lbl';
    moodTitle.style.marginBottom = '8px';
    moodTitle.textContent = 'MOOD HISTORY';
    container.appendChild(moodTitle);

    var moodCard = document.createElement('div');
    moodCard.style.cssText = 'border:2px solid rgba(153,51,204,0.3);border-radius:12px;padding:12px;margin-bottom:12px;background:rgba(153,51,204,0.06);';
    Object.keys(moodCounts).forEach(function(mood) {
      var pct = Math.round((moodCounts[mood] / moodEntries.length) * 100);
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:7px;';
      var moodLbl = document.createElement('div');
      moodLbl.style.cssText = 'font-size:12px;color:#f8e8d8;width:70px;flex-shrink:0;';
      moodLbl.textContent = mood;
      var bar = document.createElement('div');
      bar.style.cssText = 'flex:1;background:rgba(153,51,204,0.1);border-radius:99px;height:8px;overflow:hidden;';
      var fill = document.createElement('div');
      fill.style.cssText = 'height:100%;border-radius:99px;background:#9933cc;width:' + pct + '%;';
      bar.appendChild(fill);
      var pctLbl = document.createElement('div');
      pctLbl.style.cssText = 'font-size:10px;color:#8a6858;width:35px;text-align:right;';
      pctLbl.textContent = moodCounts[mood] + 'x';
      row.appendChild(moodLbl);
      row.appendChild(bar);
      row.appendChild(pctLbl);
      moodCard.appendChild(row);
    });
    container.appendChild(moodCard);
  }

  // Recent wins
  if ((state.wins || []).length > 0) {
    var winsTitle = document.createElement('div');
    winsTitle.className = 'lbl';
    winsTitle.style.marginBottom = '8px';
    winsTitle.textContent = 'RECENT WINS';
    container.appendChild(winsTitle);

function getReportRows(log) {
  var now = new Date();
  var fromDate = null;
  var toDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);

  if (state.reportRange === '7') {
    fromDate = new Date(now); fromDate.setDate(fromDate.getDate() - 6);
  } else if (state.reportRange === '30') {
    fromDate = new Date(now); fromDate.setDate(fromDate.getDate() - 29);
  } else if (state.reportRange === '90') {
    fromDate = new Date(now); fromDate.setDate(fromDate.getDate() - 89);
  } else if (state.reportRange === '365') {
    fromDate = new Date(now.getFullYear(), 0, 1);
  } else if (state.reportRange === 'custom') {
    if (state.reportCustomFrom) fromDate = new Date(state.reportCustomFrom);
    if (state.reportCustomTo)   toDate   = new Date(state.reportCustomTo + 'T23:59:59');
  }
  // 'all' = no fromDate filter

  var activeCols = Object.keys(state.reportCols).filter(function(c) { return state.reportCols[c]; });

  var rows = [];
  log.forEach(function(entry) {
    if (!state.reportCats[entry.category]) return;
    var entryDate = new Date(entry.ts);
    if (fromDate && entryDate < fromDate) return;
    if (toDate && entryDate > toDate) return;
    var row = {};
    activeCols.forEach(function(col) { row[col] = entry[col] !== undefined ? String(entry[col]) : ''; });
    rows.push(row);
  });

  return rows.slice().reverse(); // newest first
}

function rowsToCSV(rows) {
  if (rows.length === 0) return '';
  var headers = Object.keys(rows[0]);
  var lines = [headers.map(function(h) { return '"' + h.charAt(0).toUpperCase() + h.slice(1) + '"'; }).join(',')];
  rows.forEach(function(row) {
    var line = headers.map(function(h) {
      var val = String(row[h] || '').split('"').join('""');
      return '"' + val + '"';
    }).join(',');
    lines.push(line);
  });
  return lines.join('\r\n');
}

function rowsToTSV(rows) {
  if (rows.length === 0) return '';
  var headers = Object.keys(rows[0]);
  var lines = [headers.map(function(h) { return h.charAt(0).toUpperCase() + h.slice(1); }).join('\t')];
  rows.forEach(function(row) {
    var line = headers.map(function(h) {
      return String(row[h] || '').replace(/\t/g, ' ').replace(/\n/g, ' ');
    }).join('\t');
    lines.push(line);
  });
  return lines.join('\n');
}

function downloadCSV(rows) {
  if (rows.length === 0) { showFlash('No data to export'); return; }
  var csv = rowsToCSV(rows);
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'anchor_report_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showFlash('CSV DOWNLOADED!');
}

function copyTSV(rows) {
  if (rows.length === 0) { showFlash('No data to copy'); return; }
  var tsv = rowsToTSV(rows);
  copyToClipboard(tsv, 'TSV COPIED! Paste into Excel.');
}

nt = 'Anchor data: ~' + (totalSize / 1024).toFixed(1) + ' KB stored';

function exportHistoryJSON() {
  var log = S.get('a_history', []);
  var data = JSON.stringify(log, null, 2);
  copyToClipboard(data, 'History copied to clipboard!');
}

function exportAllDataJSON() {
  var allData = {};
  for (var i = 0; i < localStorage.length; i++) {
    var key = localStorage.key(i);
    if (key && key.startsWith('a_')) {
      try { allData[key] = JSON.parse(localStorage.getItem(key)); }
      catch(e) { allData[key] = localStorage.getItem(key); }
    }
  }
  var data = JSON.stringify(allData, null, 2);
  copyToClipboard(data, 'All data copied! (' + Object.keys(allData).length + ' keys)');
}

function exportHistoryText() {
  var log = S.get('a_history', []);
  var lines = ['ANCHOR HISTORY EXPORT', '=====================', ''];
  var byDate = {};
  log.forEach(function(e) {
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });
  Object.keys(byDate).sort(function(a,b){return new Date(b)-new Date(a);}).forEach(function(date) {
    lines.push('--- ' + date + ' ---');
    byDate[date].forEach(function(e) {
      lines.push('[' + e.time + '] ' + e.action + ': ' + e.detail + (e.xp ? ' (+' + e.xp + 'XP)' : ''));
    });
    lines.push('');
  });
  copyToClipboard(lines.join('\n'), 'History text copied!');
}

function copyToClipboard(text, msg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showFlash(msg || 'COPIED!');
    }).catch(function() {
      fallbackCopy(text, msg);
    });
  } else {
    fallbackCopy(text, msg);
  }
}

function fallbackCopy(text, msg) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showFlash(msg || 'COPIED!'); }
  catch(e) { showFlash('Copy failed — try a different browser'); }
  document.body.removeChild(ta);
}

function analyzeTrends() {

  if (log.length < 3) return null;

  var AREA_IDS = ['self','mental','marriage','family','work','rediscover'];
  AREA_IDS.forEach(function(a) { areaStats[a] = 0; });
  log.filter(function(e) { return e.category === 'quest'; }).forEach(function(e) {
    var area = e.detail ? e.detail.toLowerCase() : '';
    AREA_IDS.forEach(function(a) {
      if (e.action && e.action.toLowerCase().indexOf(a) >= 0) areaStats[a]++;
    });
  });
  // Also use state.stats for more accurate area data
  if (state.stats) {
    Object.keys(state.stats).forEach(function(k) {
      if (areaStats.hasOwnProperty(k)) areaStats[k] = Math.max(areaStats[k], state.stats[k] || 0);
    });
  }

  // 5. Peak productivity hour
  var peakHour = 0;
  var peakCount = 0;
  Object.keys(byHour).forEach(function(h) {
    if (byHour[h] > peakCount) { peakCount = byHour[h]; peakHour = parseInt(h); }
  });

  // 6. Peak day
  var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var peakDay = 0;
  var peakDayCount = 0;
  Object.keys(byDay).forEach(function(d) {
    if (byDay[d] > peakDayCount) { peakDayCount = byDay[d]; peakDay = parseInt(d); }
  });

  // 7. Best mood hour
  var bestMoodHour = null;
  var bestMoodScore = -1;
  Object.keys(moodByHour).forEach(function(h) {
    var avg = moodByHour[h].total / moodByHour[h].count;
    if (avg > bestMoodScore) { bestMoodScore = avg; bestMoodHour = parseInt(h); }
  });

  // 8. Consistency score (% of last 14 days with at least 1 quest)
  var last14 = {};
  for (var i = 0; i < 14; i++) {
    var d = new Date(now - i * 24 * 60 * 60 * 1000);
    last14[d.toDateString()] = false;
  }
  log.filter(function(e) { return e.category === 'quest'; }).forEach(function(e) {
    var ds = new Date(e.ts).toDateString();
    if (last14.hasOwnProperty(ds)) last14[ds] = true;
  });
  var activeDays = Object.keys(last14).filter(function(k){return last14[k];}).length;
  var consistency = Math.round((activeDays / 14) * 100);

  // 9. Best area
  var bestArea = 'self';
  var bestAreaCount = 0;
  Object.keys(areaStats).forEach(function(a) {
    if (areaStats[a] > bestAreaCount) { bestAreaCount = areaStats[a]; bestArea = a; }
  });

  // 10. Struggling area (least completed, min 0)
  var worstArea = 'self';
  var worstAreaCount = Infinity;
  Object.keys(areaStats).forEach(function(a) {
    if (areaStats[a] < worstAreaCount) { worstAreaCount = areaStats[a]; worstArea = a; }
  });

  // 11. Total quests, XP, streak
  var totalQuests = log.filter(function(e) { return e.category === 'quest'; }).length;
  var totalXP = (state.level - 1) * 100 + state.xp;

  // 12. Recent momentum (last 7 days vs prev 7)
  var sevenDays = now - (7 * 24 * 60 * 60 * 1000);
  var fourteenDays = now - (14 * 24 * 60 * 60 * 1000);
  var thisWeek = log.filter(function(e) { return e.category === 'quest' && e.ts > sevenDays; }).length;
  var lastWeek = log.filter(function(e) { return e.category === 'quest' && e.ts > fourteenDays && e.ts <= sevenDays; }).length;
  var momentum = lastWeek > 0 ? Math.round(((thisWeek - lastWeek) / lastWeek) * 100) : (thisWeek > 0 ? 100 : 0);

  return {
    byHour: byHour,
    byDay: byDay,
    moodByHour: moodByHour,
    areaStats: areaStats,
    peakHour: peakHour,
    peakCount: peakCount,
    peakDay: peakDay,
    peakDayCount: peakDayCount,
    bestMoodHour: bestMoodHour,
    bestMoodScore: bestMoodScore,
    consistency: consistency,
    bestArea: bestArea,
    worstArea: worstArea,
    totalQuests: totalQuests,
    totalXP: totalXP,
    thisWeek: thisWeek,
    lastWeek: lastWeek,
    momentum: momentum,
    dayNames: dayNames,
    logCount: log.length,
  };
}

function formatHour(h) {
  if (h === 0) return '12am';
  if (h < 12) return h + 'am';
  if (h === 12) return '12pm';
  return (h - 12) + 'pm';
}

var AREA_LABELS = {self:'Self Care', mental:'Mental HP', marriage:'Partner', family:'Family', work:'Career', rediscover:'Discover'};
var AREA_ICONS  = {self:'💜', mental:'🧠', marriage:'💗', family:'🌟', work:'⚡', rediscover:'🎮'};

function buildInsightText(t) {
  var lines = [];
  if (t.peakCount > 0) {
    lines.push('Your peak productivity window is ' + t.dayNames[t.peakDay] + 's around ' + formatHour(t.peakHour) + '.');
  }
  if (t.bestMoodHour !== null && t.bestMoodScore > 2) {
    lines.push('You tend to feel best around ' + formatHour(t.bestMoodHour) + ' EST.');
  }
  if (t.momentum > 20) {
    lines.push('You\'re on an upswing — ' + t.momentum + '% more quests than last week.');
  } else if (t.momentum < -20) {
    lines.push('Slower week than last — and that\'s okay. You\'re still here.');
  }
  if (t.bestArea && t.areaStats[t.bestArea] > 0) {
    lines.push((AREA_ICONS[t.bestArea] || '') + ' ' + (AREA_LABELS[t.bestArea] || t.bestArea) + ' is your strongest area.');
  }
  if (lines.length === 0) lines.push('Keep logging — your trends will appear here once you have more data.');
  return lines.slice(0, 2).join(' ');
}

// ── INSIGHTS TAB (History) ───────────────────────────────
function renderHistoryInsights(container, log) {

  aiTitle.innerHTML = '🧠 <span>AI TREND ANALYSIS</span>';
  var aiBody = document.createElement('div');

  aiBody.style.cssText = 'font-size:13px;color:#f8e8d8;line-height:1.7;';

  } else {

  }
  var refreshAI = document.createElement('button');

  refreshAI.textContent = 'Refresh analysis';
  refreshAI.addEventListener('click', function() {

    function(item) { return item.label; },
    function(item) { return item.value; },
    'Quests completed per hour (EST)'
  );

  // ── PRODUCTIVITY BY DAY
  renderBarChart(container, 'PRODUCTIVITY BY DAY', '#c8960e',
    t.dayNames.map(function(n, i) { return {label: n.slice(0,3), value: t.byDay[i] || 0}; }),
    function(item) { return item.label; },
    function(item) { return item.value; },

  );

      return {label: formatHour(parseInt(h)), value: parseFloat((t.moodByHour[h].total / t.moodByHour[h].count).toFixed(1))};

    function(item) { return item.label; },
    function(item) { return item.value; },
    'Total quests completed per life area'
  );

    {label:'Peak Day',      val: t.dayNames[t.peakDay],               color:'#c8960e', icon:'📅'},
    {label:'Consistency',   val: t.consistency + '% (14 days)',       color:'#5abe7a', icon:'✅'},
    {label:'This Week',     val: t.thisWeek + ' quests',              color:'#9933cc', icon:'⚔️'},
    {label:'Momentum',      val: (t.momentum >= 0 ? '+' : '') + t.momentum + '%', color: t.momentum >= 0 ? '#5abe7a' : '#d42070', icon:'📈'},

  ];

    val.textContent = stat.val;
    card.appendChild(row);
    card.appendChild(val);
    grid.appendChild(card);
  });

}

function renderBarChart(container, title, color, items, getLabel, getValue, subtitle) {
  var maxVal = 0;
  items.forEach(function(item) { if (getValue(item) > maxVal) maxVal = getValue(item); });
  if (maxVal === 0) maxVal = 1;

  var section = document.createElement('div');
  section.style.cssText = 'margin-bottom:16px;';

  var titleEl = document.createElement('div');
  titleEl.style.cssText = 'font-family:Nunito,sans-serif;font-weight:800;font-size:12px;color:' + color + ';letter-spacing:0.08em;margin-bottom:4px;';
  titleEl.textContent = title;
  section.appendChild(titleEl);

  if (subtitle) {
    var sub = document.createElement('div');
    sub.style.cssText = 'font-size:10px;color:#8a6858;margin-bottom:8px;';
    sub.textContent = subtitle;
    section.appendChild(sub);
  }

  var chartWrap = document.createElement('div');
  chartWrap.style.cssText = 'background:rgba(200,150,14,0.04);border:1px solid rgba(200,150,14,0.15);border-radius:12px;padding:10px 8px;';

  items.forEach(function(item) {
    var val = getValue(item);
    var pct = maxVal > 0 ? (val / maxVal) * 100 : 0;
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:5px;';
    var lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:10px;color:#8a6858;width:40px;flex-shrink:0;text-align:right;';
    lbl.textContent = getLabel(item);
    var barWrap = document.createElement('div');
    barWrap.style.cssText = 'flex:1;background:rgba(200,150,14,0.08);border-radius:99px;height:14px;overflow:hidden;';
    var bar = document.createElement('div');
    bar.style.cssText = 'height:100%;border-radius:99px;background:' + color + ';width:' + pct.toFixed(1) + '%;transition:width 0.4s ease;';
    barWrap.appendChild(bar);
    var valLbl = document.createElement('div');
    valLbl.style.cssText = 'font-size:10px;color:#8a6858;width:24px;text-align:right;flex-shrink:0;';
    valLbl.textContent = val || '';
    row.appendChild(lbl);
    row.appendChild(barWrap);
    row.appendChild(valLbl);
    chartWrap.appendChild(row);
  });

  section.appendChild(chartWrap);
  container.appendChild(section);
}

async function generateAIInsight(t, bodyEl) {
  var summary = 'User stats: ' +
    'Peak productivity hour: ' + formatHour(t.peakHour) + ' EST. ' +
    'Peak day: ' + t.dayNames[t.peakDay] + '. ' +
    'Best mood time: ' + (t.bestMoodHour !== null ? formatHour(t.bestMoodHour) + ' EST' : 'unknown') + '. ' +
    'Strongest area: ' + (AREA_LABELS[t.bestArea] || t.bestArea) + ' (' + (t.areaStats[t.bestArea] || 0) + ' quests). ' +
    'Focus area (lowest): ' + (AREA_LABELS[t.worstArea] || t.worstArea) + ' (' + (t.areaStats[t.worstArea] || 0) + ' quests). ' +
    'Consistency last 14 days: ' + t.consistency + '%. ' +
    'This week vs last week: ' + t.thisWeek + ' vs ' + t.lastWeek + ' quests (' + (t.momentum >= 0 ? '+' : '') + t.momentum + '%). ' +
    'Total quests completed: ' + t.totalQuests + '. ' +
    'Current level: ' + state.level + '.';

  var prompt = 'You are ARIA, a warm AI companion for someone with ADHD burnout, depression, and anxiety. Based on their usage data, write a personalized trend insight — 3-4 sentences, plain language, warm but real. Highlight their actual peak times, what they are doing well, and ONE gentle observation about where they might focus. No toxic positivity. No generic advice. Base everything on the specific numbers. Data: ' + summary;

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: getApiHeaders(),
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        messages: [{role:'user', content: prompt}]
      })
    });
    var data = await res.json();
    var text = data.content.map(function(c) { return c.text || ''; }).join('').trim();
    bodyEl.textContent = text;
    S.set('a_insight_cache', text);
    S.set('a_insight_cache_date', new Date().toDateString());
  } catch(e) {
    bodyEl.textContent = buildInsightText(t) + ' Check back as you log more data for a deeper analysis.';
  }
}

// ── ARIA TREND AWARENESS ────────────────────────────────
function getTrendContext() {
  var t = analyzeTrends();
  if (!t || t.logCount < 5) return '';
  return ' USER TREND DATA: Peak productivity at ' + formatHour(t.peakHour) + ' EST on ' + t.dayNames[t.peakDay] + 's. Consistency last 14 days: ' + t.consistency + '%. Strongest area: ' + (AREA_LABELS[t.bestArea] || t.bestArea) + '. Focus area: ' + (AREA_LABELS[t.worstArea] || t.worstArea) + '. Momentum: ' + (t.momentum >= 0 ? '+' : '') + t.momentum + '% vs last week. Use this data if the user asks about their patterns, progress, or habits.';
}
